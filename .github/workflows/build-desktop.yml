name: Build Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: desktop-app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./desktop-app
      run: |
        ls -la
        npm ci --verbose
    
    - name: Create dist directory
      working-directory: ./desktop-app
      run: mkdir -p dist
    
    - name: Build Windows app
      working-directory: ./desktop-app
      run: |
        npm run build
        ls -la dist/
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: revolution-network-windows
        path: desktop-app/dist/
        retention-days: 30
      continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: desktop-app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./desktop-app
      run: |
        ls -la
        npm ci --verbose
    
    - name: Create dist directory
      working-directory: ./desktop-app
      run: mkdir -p dist
    
    - name: Create Mac icon and background (placeholder)
      working-directory: ./desktop-app
      run: |
        mkdir -p assets
        if [ ! -f assets/icon.icns ]; then
          echo "Creating placeholder icon"
          cp assets/logo.jpg assets/icon.icns 2>/dev/null || touch assets/icon.icns
        fi
        if [ ! -f assets/dmg-background.png ]; then
          echo "Creating placeholder DMG background"
          # Create a simple 1x1 pixel PNG as placeholder
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" | base64 -d > assets/dmg-background.png
        fi
    
    - name: Build macOS app
      working-directory: ./desktop-app
      run: |
        npm run build-mac || true
        ls -la dist/
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: revolution-network-macos
        path: desktop-app/dist/
        retention-days: 30
      continue-on-error: true

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: revolution-network-windows
        path: ./windows
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: revolution-network-macos
        path: ./macos
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./windows/**/*
          ./macos/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
