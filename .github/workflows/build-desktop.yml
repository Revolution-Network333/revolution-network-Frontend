name: Build Desktop App

on:
  release:
    types: [ published ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: desktop-app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./desktop-app
      run: |
        ls -la
        npm ci --verbose

    - name: Prepare Windows code signing certificate (optional)
      if: github.event_name == 'release'
      shell: pwsh
      run: |
        if ([string]::IsNullOrWhiteSpace($env:WIN_CERT_BASE64) -or [string]::IsNullOrWhiteSpace($env:WIN_CERT_PASSWORD)) {
          Write-Host "Windows code signing secrets not configured. Building unsigned installer."
          exit 0
        }

        $bytes = [Convert]::FromBase64String($env:WIN_CERT_BASE64)
        [IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\desktop-app\cert.pfx", $bytes)
        "CSC_LINK=cert.pfx" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "CSC_KEY_PASSWORD=$env:WIN_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Create dist directory
      working-directory: ./desktop-app
      run: mkdir -p dist
    
    - name: Build Windows app
      working-directory: ./desktop-app
      run: |
        npm run build -- --publish never
        ls -la dist/
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: revolution-network-windows
        path: desktop-app/dist/
        retention-days: 30
      continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: desktop-app/package-lock.json
    
    - name: Install dependencies
      working-directory: ./desktop-app
      run: |
        ls -la
        npm ci --verbose
    
    - name: Create dist directory
      working-directory: ./desktop-app
      run: mkdir -p dist

    - name: Generate Mac assets
      working-directory: ./desktop-app
      run: |
        npm install sharp
        node -e "
        const sharp = require('sharp');
        const path = require('path');
        const fs = require('fs');

        (async () => {
          const assetsDir = 'assets';
          if (!fs.existsSync(assetsDir)) fs.mkdirSync(assetsDir, { recursive: true });

          // Create icon.png
          const iconSvg = \`<svg width=\"1024\" height=\"1024\"><defs><linearGradient id=\"g\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"#10b981\"/><stop offset=\"100%\" stop-color=\"#059669\"/></linearGradient></defs><rect width=\"100%\" height=\"100%\" fill=\"url(#g)\" rx=\"200\"/><text x=\"50%\" y=\"50%\" font-size=\"400\" font-weight=\"bold\" fill=\"white\" text-anchor=\"middle\" dominant-baseline=\"middle\">R</text></svg>\`;
          await sharp(Buffer.from(iconSvg)).resize(1024, 1024).png().toFile(path.join(assetsDir, 'icon.png'));
          console.log('icon.png created');

          // Create dmg-background.png
          const bgSvg = \`<svg width=\"1920\" height=\"600\"><defs><linearGradient id=\"grad\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\"><stop offset=\"0%\" stop-color=\"#0f172a\"/><stop offset=\"100%\" stop-color=\"#1e293b\"/></linearGradient></defs><rect width=\"100%\" height=\"100%\" fill=\"url(#grad)\"/><circle cx=\"960\" cy=\"300\" r=\"100\" fill=\"#10b981\" opacity=\"0.3\"/></svg>\`;
          await sharp(Buffer.from(bgSvg)).resize(1920, 600).png().toFile(path.join(assetsDir, 'dmg-background.png'));
          console.log('dmg-background.png created');
        })();
        "

    - name: Build macOS app
      working-directory: ./desktop-app
      run: |
        npm run build-mac -- --publish never
        ls -la dist/

    - name: Test app launch and screenshot
      working-directory: ./desktop-app
      run: |
        open dist/mac-arm64/*.app || open dist/mac/*.app || open dist/*.app
        sleep 5
        screencapture -x screenshot.png
        ls -la screenshot.png

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: revolution-network-macos
        path: desktop-app/dist/
        retention-days: 30
      continue-on-error: true

    - name: Upload screenshot
      uses: actions/upload-artifact@v4
      with:
        name: mac-app-screenshot
        path: desktop-app/screenshot.png
        retention-days: 30
      continue-on-error: true

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: revolution-network-windows
        path: ./windows
      continue-on-error: true
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: revolution-network-macos
        path: ./macos
      continue-on-error: true
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./windows/**/*
          ./macos/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
