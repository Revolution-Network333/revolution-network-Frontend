name: Build Mobile Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build Android APK
      run: |
        cd android-node
        gradle assembleDebug --stacktrace --warning-mode=none
    
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-debug
        path: android-node/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build iOS IPA
      run: |
        cd ios-node/RevolutionNetworkNode
        xcodebuild -project RevolutionNetworkNode.xcodeproj -scheme RevolutionNetworkNode -configuration Debug -archivePath build/RevolutionNetworkNode.xcarchive archive
        xcodebuild -exportArchive -archivePath build/RevolutionNetworkNode.xcarchive -exportPath build -exportOptionsPlist exportOptions.plist || true
    
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-debug
        path: ios-node/RevolutionNetworkNode/build/RevolutionNetworkNode.ipa
        retention-days: 30
      continue-on-error: true
