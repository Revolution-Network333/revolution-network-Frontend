name: Postgres Backup to Google Drive

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_EXTERNAL }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS || '30' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client rclone

      - name: Create backup
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "Missing DATABASE_URL_EXTERNAL secret"
            exit 1
          fi
          ts="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          backup_dir="backups"
          mkdir -p "${backup_dir}"
          backup_file="${backup_dir}/revolution_network_${ts}.dump"
          pg_dump "${DATABASE_URL}" --format=custom --no-owner --no-acl --file "${backup_file}"
          echo "BACKUP_FILE=${backup_file}" >> "$GITHUB_ENV"

      - name: Configure rclone (Google Drive)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GDRIVE_SERVICE_ACCOUNT_JSON:-}" ]]; then
            echo "Missing GDRIVE_SERVICE_ACCOUNT_JSON secret"
            exit 1
          fi
          if [[ -z "${GDRIVE_FOLDER_ID:-}" ]]; then
            echo "Missing GDRIVE_FOLDER_ID secret"
            exit 1
          fi
          sa_file="${RUNNER_TEMP}/gdrive-sa.json"
          printf '%s' "${GDRIVE_SERVICE_ACCOUNT_JSON}" > "${sa_file}"
          mkdir -p "${HOME}/.config/rclone"
          cat > "${HOME}/.config/rclone/rclone.conf" <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = ${sa_file}
          root_folder_id = ${GDRIVE_FOLDER_ID}
          EOF

      - name: Upload backup to Google Drive
        shell: bash
        run: |
          set -euo pipefail
          rclone copy "${BACKUP_FILE}" gdrive: --drive-chunk-size 64M

      - name: Retention (delete old backups)
        shell: bash
        run: |
          set -euo pipefail
          days="${BACKUP_RETENTION_DAYS:-30}"
          rclone delete gdrive: --min-age "${days}d" --drive-use-trash=false

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: pg-backup
          path: ${{ env.BACKUP_FILE }}
