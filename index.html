<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révolution Network - Dashboard</title>
    <link rel="icon" type="image/png" sizes="32x32" href="chrome-extension/assets/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="chrome-extension/assets/icon-16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Sign-In API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script async src="https://js.stripe.com/v3/buy-button.js"></script>
    <style>
        /* Styles de base pour le bouton Google et l'UI */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .app {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #1e1e1e;
            padding: 20px;
            height: 100vh;
            position: fixed;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
            width: calc(100% - 250px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        #g_id_onload {
            display: none;
        }
        .g_id_signin {
            margin-left: auto;
        }
        .hidden {
            display: none;
        }
        .user-info {
            margin-left: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="image__4_-removebg-preview.png" alt="Logo" class="logo-icon">
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-label" data-i18n="menu.label">MENU</div>
                <button class="menu-item active" onclick="setPage('overview')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    <span data-i18n="menu.overview">Overview</span>
                </button>
                <!-- Ajoute d'autres éléments de menu ici -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="header-right">
                    <!-- Bouton de connexion Google -->
                    <div id="g_id_onload"
                         data-client_id="471066806195-jj4ke1jstv3lh7a09mv3lmk60a5rkp4g.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="filled_blue"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left"
                         id="googleSignInButton">
                    </div>
                    <!-- Affichage des infos utilisateur après connexion -->
                    <div class="user-info hidden" id="userInfo">
                        <span id="userEmail"></span>
                        <button onclick="logout()" style="margin-left: 10px; background: none; border: none; color: #ff4444; cursor: pointer;">Déconnexion</button>
                    </div>
                </div>
            </header>

            <!-- Contenu principal -->
            <div id="content">
                <p>Bienvenue sur Révolution Network. Connecte-toi avec Google pour accéder à ton dashboard.</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // Gestion de la réponse de connexion Google
        function handleCredentialResponse(response) {
            fetch('https://ton-backend-render.onrender.com/api/auth/google', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ token: response.credential }),
            })
            .then(response => response.json())
            .then(data => {
                console.log("Réponse du serveur :", data);
                if (data.success) {
                    // Stocker le JWT dans localStorage
                    localStorage.setItem('jwtToken', data.token);
                    // Afficher les infos utilisateur
                    document.getElementById('userEmail').textContent = data.user.email;
                    document.getElementById('googleSignInButton').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    // Charger le contenu du dashboard
                    loadDashboard();
                } else {
                    alert("Échec de la connexion : " + data.message);
                }
            })
            .catch(error => {
                console.error("Erreur :", error);
                alert("Erreur lors de la connexion.");
            });
        }

        // Charger le contenu du dashboard
        function loadDashboard() {
            const token = localStorage.getItem('jwtToken');
            fetch('https://ton-backend-render.onrender.com/api/protected', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token,
                },
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('content').innerHTML = `
                        <h2>Bienvenue, ${data.user.username} !</h2>
                        <p>Email : ${data.user.email}</p>
                        <p>ID : ${data.user.id}</p>
                        <!-- Ajoute ici le contenu de ton dashboard -->
                    `;
                } else {
                    alert("Accès refusé : " + data.message);
                }
            })
            .catch(error => {
                console.error("Erreur :", error);
                alert("Erreur lors du chargement du dashboard.");
            });
        }

        // Déconnexion
        function logout() {
            localStorage.removeItem('jwtToken');
            document.getElementById('googleSignInButton').classList.remove('hidden');
            document.getElementById('userInfo').classList.add('hidden');
            document.getElementById('content').innerHTML = `
                <p>Bienvenue sur Révolution Network. Connecte-toi avec Google pour accéder à ton dashboard.</p>
            `;
        }

        // Vérifier si l'utilisateur est déjà connecté au chargement de la page
        window.onload = function() {
            const token = localStorage.getItem('jwtToken');
            if (token) {
                document.getElementById('googleSignInButton').classList.add('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                // Charger l'email de l'utilisateur depuis le JWT (ou appeler /api/protected)
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('userEmail').textContent = payload.email;
                loadDashboard();
            }
        };

        // Fonction pour changer de page (exemple)
        function setPage(page) {
            console.log("Changement de page :", page);
            // Logique pour changer de page
        }
    </script>
</body>
</html>
