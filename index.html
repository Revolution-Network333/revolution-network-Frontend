        function t(key) {
            const d = i18n[currentLang] || i18n.fr;
            return d[key] || (i18n.fr[key] || key);
        }
        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.getAttribute('data-i18n');
                el.textContent = t(k);
            });
            currentLocale = LANGS[currentLang]?.locale || 'fr-FR';
        }
        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.getElementById('lang-switch');
            if (sel) {
                sel.value = currentLang;
                sel.addEventListener('change', () => {
                    currentLang = sel.value;
                    localStorage.setItem('lang', currentLang);
                    applyTranslations();
                    renderPage();
                });
            }
            applyTranslations();
        });
        
        // Parrainage supprimé: aucune lecture de code referral depuis l’URL

        // State
        let currentPage = localStorage.getItem('token') ? 'overview' : 'login';
        let currentUsername = null;

        // Navigation
        function setPage(page) {
            console.log('Navigating to:', page);
            // Clear intervals from previous pages
            if (overviewInterval) {
                clearInterval(overviewInterval);
                overviewInterval = null;
            }
            if (nodesInterval) {
                clearInterval(nodesInterval);
                nodesInterval = null;
            }
            if (rewardsInterval) {
                clearInterval(rewardsInterval);
                rewardsInterval = null;
            }

            const token = localStorage.getItem('token');
            currentPage = (!token && page !== 'login') ? 'login' : page;
            
            // Mettre à jour les classes active
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                const onclick = item.getAttribute('onclick');
                if (onclick && onclick.includes(`'${page}'`)) {
                    item.classList.add('active');
                }
            });
            
            try {
                renderPage();
            } catch (e) {
                console.error('Error rendering page:', e);
            }

            if (window.innerWidth <= 768) {
                toggleMobileMenu();
            }
        }

        // Expose setPage to window
        window.setPage = setPage;

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        }

        // Mobile menu
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Header refresh from profile
        function refreshHeader() {
            const token = localStorage.getItem('token');
            const accountStatus = document.querySelector('.account-status');
            const totalPoints = document.querySelector('.total-points');
            const headerLogoutBtn = document.getElementById('header-logout-btn');
            const userAvatar = document.querySelector('.user-avatar');
            const headerRankBadge = document.getElementById('header-rank-badge');

            if (!token) {
                if (accountStatus) accountStatus.style.display = 'none';
                if (totalPoints) totalPoints.style.display = 'none';
                const walletBal = document.querySelector('.wallet-balance');
                if (walletBal) walletBal.style.display = 'none';
                const apiCred = document.querySelector('.api-credits');
                if (apiCred) apiCred.style.display = 'none';
                if (headerRankBadge) headerRankBadge.style.display = 'none';
                if (headerLogoutBtn) headerLogoutBtn.style.display = 'none';
                if (userAvatar) userAvatar.style.display = 'none';
                const headerLoginBtn = document.getElementById('header-login-btn');
                if (headerLoginBtn) headerLoginBtn.style.display = 'inline-flex';
                return;
            }

            const headerLoginBtn = document.getElementById('header-login-btn');
            if (headerLoginBtn) headerLoginBtn.style.display = 'none';
            if (accountStatus) accountStatus.style.display = 'flex';
            if (totalPoints) totalPoints.style.display = 'inline-flex';
            const headerTotalPoints = document.getElementById('header-total-points');
            if (headerTotalPoints) headerTotalPoints.textContent = 'Total: ...';
            const walletBal = document.querySelector('.wallet-balance');
            if (walletBal) walletBal.style.display = 'inline-flex';
            const headerWalletBalance = document.getElementById('header-wallet-balance');
            if (headerWalletBalance) headerWalletBalance.textContent = 'ZETA: ...';
            const apiCred = document.querySelector('.api-credits');
            if (apiCred) apiCred.style.display = 'inline-flex';
            const headerApiCredits = document.getElementById('header-api-credits');
            if (headerApiCredits) headerApiCredits.textContent = 'API: ...';
            if (headerLogoutBtn) headerLogoutBtn.style.display = 'inline-flex';

            fetch(`${API_BASE}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(async res => {
                if (res.status === 401) {
                    const rt = localStorage.getItem('refreshToken');
                    if (rt) {
                        const rf = await fetch(`${API_BASE}/api/auth/refresh`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refreshToken: rt })
                        });
                        if (rf.ok) {
                            const j = await rf.json();
                            if (j.token) {
                                localStorage.setItem('token', j.token);
                                return fetch(`${API_BASE}/api/user/profile`, {
                                    headers: { 'Authorization': `Bearer ${j.token}` }
                                });
                            }
                        }
                    }
                    throw new Error('Token invalide');
                }
                return res.json();
            })
            .then(data => {
                if (data.user) {
                    currentUsername = data.user.username || null;
                    try { window.currentUserId = data.user.id; } catch {}
                    const tp = document.getElementById('header-total-points');
                    if (tp) tp.textContent = `Total: ${data.user.total_points} pt`;
                    // Afficher le bonus de minage
                    const mb = document.getElementById('header-mining-bonus');
                    const token = localStorage.getItem('token');
                    if (token && mb) {
                        fetch(`${API_BASE}/api/user/tasks/bonus`, { headers: { 'Authorization': `Bearer ${token}` }})
                        .then(r=>r.json()).then(j=>{
                            const p = Number(j.bonusPercent)||0;
                            if (p > 0) { mb.style.display='inline-block'; mb.textContent = `+${p}% ${t('tasks.miningBonusLabel')}`; }
                            else mb.style.display='none';
                        }).catch(()=>{ mb.style.display='none'; });
                    }
                    // Parrainage supprimé: pas d’affichage de parrainés

                    if (userAvatar) {
                        userAvatar.style.display = 'flex';
                        if (data.user.profile_picture_url) {
                            // Ensure the URL is absolute if it starts with /public
                            const bgUrl = `${API_BASE}${data.user.profile_picture_url}?t=${Date.now()}`;
                            userAvatar.style.backgroundImage = `url('${bgUrl}')`;
                            userAvatar.textContent = '';
                        } else if (data.user.username) {
                            userAvatar.textContent = data.user.username.charAt(0).toUpperCase();
                            userAvatar.style.backgroundImage = '';
                        }
                    }
                    if (headerRankBadge) {
                        const rank = (data.user.rank || 'Bronze').toLowerCase();
                        headerRankBadge.textContent = data.user.rank || 'Bronze';
                        headerRankBadge.className = 'header-user-rank';
                        if (rank === 'bronze') headerRankBadge.classList.add('rank-badge', 'rank-badge-bronze');
                        else if (rank === 'silver') headerRankBadge.classList.add('rank-badge', 'rank-badge-silver');
                        else if (rank === 'gold') headerRankBadge.classList.add('rank-badge', 'rank-badge-gold');
                        else if (rank === 'platinum') headerRankBadge.classList.add('rank-badge', 'rank-badge-platinum');
                        else if (rank === 'diamond') headerRankBadge.classList.add('rank-badge', 'rank-badge-diamond');
                        headerRankBadge.style.display = 'inline-flex';
                    }
                    const role = (data.user.role || 'user').toLowerCase();
                    const uname = (data.user.username || '').toLowerCase();
                    const enterpriseBtn = document.getElementById('menu-enterprise-api');
                    const adminBtn = document.getElementById('menu-admin');
                    const adminShopBtn = document.getElementById('menu-admin-shop');
                    const adminTasksBtn = document.getElementById('menu-admin-tasks');
                    if (enterpriseBtn) {
                        enterpriseBtn.style.display = (role === 'entreprise' || role === 'admin' || uname === 'korn666') ? 'flex' : 'none';
                    }
                    if (adminBtn) {
                        adminBtn.style.display = (role === 'admin' || uname === 'korn666') ? 'flex' : 'none';
                    }
                    if (adminShopBtn) {
                        adminShopBtn.style.display = (role === 'admin' || uname === 'korn666') ? 'flex' : 'none';
                    }
                    if (adminTasksBtn) {
                        adminTasksBtn.style.display = (role === 'admin' || uname === 'korn666') ? 'flex' : 'none';
                    }
                    const headerLoginBtn = document.getElementById('header-login-btn');
                    if (headerLoginBtn) headerLoginBtn.style.display = 'none';
                    const walletBal = document.querySelector('.wallet-balance');
                    if (walletBal) walletBal.style.display = 'inline-flex';
                    fetch(`${API_BASE}/api/wallet/balance`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }})
                      .then(r=>r.json()).then(j=>{
                        const wb = document.getElementById('header-wallet-balance');
                        if (wb) wb.textContent = `ZETA: ${(j.balanceZeta||0).toLocaleString(undefined,{maximumFractionDigits:8})}`;
                      }).catch(()=>{});
                    const apiCred = document.querySelector('.api-credits');
                    if (apiCred) apiCred.style.display = 'inline-flex';
                    fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }})
                      .then(r=>r.json()).then(j=>{
                        const ac = document.getElementById('header-api-credits');
                        if (ac) ac.textContent = `API: ${(j.credits?.remaining||0).toLocaleString()}`;
                      }).catch(()=>{});
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                const headerLoginBtn = document.getElementById('header-login-btn');
                const accountStatus = document.querySelector('.account-status');
                const totalPoints = document.querySelector('.total-points');
                const headerLogoutBtn = document.getElementById('header-logout-btn');
                const userAvatar = document.querySelector('.user-avatar');
                if (accountStatus) accountStatus.style.display = 'none';
                if (totalPoints) totalPoints.style.display = 'none';
                const walletBal = document.querySelector('.wallet-balance');
                if (walletBal) walletBal.style.display = 'none';

        function maskUsername(name) {
            if (!name) return '';
            if (currentUsername && name === currentUsername) return name;
            const n = name.length;
            const half = Math.ceil(n / 2);
            return name.slice(0, half) + '*'.repeat(n - half);
        }

        function initializeLoginPage() {
            const loginForm = document.getElementById('login-form');
            if (!loginForm) return;

            const emailInput = document.getElementById('login-email');
            const passInput = document.getElementById('login-password');
            const googleBtn = document.getElementById('google-login-btn');
            const phantomBtn = document.getElementById('phantom-login-btn');
            const urlParams = new URL(window.location.href).searchParams;
            const referralCodeFromUrl = urlParams.get('ref') || null;
            if (referralCodeFromUrl) {
                try { localStorage.setItem('referralCode', referralCodeFromUrl); } catch {}
            }
            
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                console.log('Login attempt...');
                fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                email: emailInput.value, 
                                password: passInput.value
                            })
                })
                .then(async res => {
                    try {
                        const data = await res.json();
                        return { ok: res.ok, data };
                    } catch {
                        const text = await res.text();
                        return { ok: res.ok, data: { error: text || 'Erreur serveur' } };
                    }
                })
                .then(({ ok, data }) => {
                    if (ok && data.token) {
                        localStorage.setItem('token', data.token);
                        if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                        currentPage = 'overview';
                        renderPage();
                        refreshHeader();
                        const lm = document.getElementById('login-modal');
                        if (lm) lm.classList.remove('open');
                    } else {
                        alert('Connexion échouée: ' + (data.error || 'Erreur inconnue'));
                    }
                })
                .catch(err => {
                    console.error('Login error:', err);
                    alert('Erreur de connexion au serveur');
                });
            });

            if (googleBtn) {
                googleBtn.addEventListener('click', () => {
                    const clientIdStored = (window.GOOGLE_CLIENT_ID || localStorage.getItem('googleClientId') || '').trim();
                    const tryStartGis = (clientId) => {
                        const s = document.createElement('script');
                        s.src = 'https://accounts.google.com/gsi/client';
                        s.onload = () => {
                            try {
                                google.accounts.id.initialize({
                                    client_id: clientId,
                                    callback: (resp) => {
                                        if (!resp || !resp.credential) { alert('Échec Google'); return; }
                                        fetch(`${API_BASE}/api/auth/google-oauth`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ idToken: resp.credential })
                                        })
                                        .then(res => res.json())
                                        .then(data => {
                                            if (data.token) {
                                                localStorage.setItem('token', data.token);
                                                if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                                                currentPage = 'overview';
                                                renderPage();
                                                refreshHeader();
                                            } else {
                                                alert(data.error || 'Connexion Google impossible');
                                            }
                                        })
                                        .catch(() => alert('Erreur de connexion au serveur Google'));
                                    },
                                    auto_select: true,
                                });
                                google.accounts.id.prompt();
                            } catch {
                                alert('Google Identity indisponible');
                            }
                        };
                        document.head.appendChild(s);
                    };
                    if (!clientIdStored) {
                        fetch(`${API_BASE}/api/public/config`)
                          .then(r => r.json())
                          .then(c => {
                              if (c.googleClientId) {
                                  localStorage.setItem('googleClientId', c.googleClientId);
                                  tryStartGis(c.googleClientId);
                                  return;
                              }
                              const deviceId = localStorage.getItem('googleGuestId') || (localStorage.setItem('googleGuestId', Math.random().toString(36).slice(2)), localStorage.getItem('googleGuestId'));
                              try { window.open('https://accounts.google.com/AccountChooser?continue=https://www.google.com', '_blank'); } catch {}
                              fetch(`${API_BASE}/api/auth/google-login`, {
                                  method: 'POST',
                                  headers: { 'Content-Type': 'application/json' },
                                  body: JSON.stringify({ email: null, deviceId })
                              })
                              .then(res => res.json())
                              .then(data => {
                                  if (data.token) {
                                      localStorage.setItem('token', data.token);
                                      if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                                      currentPage = 'overview';
                                      renderPage();
                                      refreshHeader();
                                  } else {
                                      alert(data.error || 'Connexion Google impossible');
                                  }
                              })
                              .catch(() => {
                                  alert('Erreur de connexion au serveur Google');
                              });
                          })
                          .catch(() => {
                              const deviceId = localStorage.getItem('googleGuestId') || (localStorage.setItem('googleGuestId', Math.random().toString(36).slice(2)), localStorage.getItem('googleGuestId'));
                              try { window.open('https://accounts.google.com/AccountChooser?continue=https://www.google.com', '_blank'); } catch {}
                              fetch(`${API_BASE}/api/auth/google-login`, {
                                  method: 'POST',
                                  headers: { 'Content-Type': 'application/json' },
                                  body: JSON.stringify({ email: null, deviceId })
                              })
                              .then(res => res.json())
                              .then(data => {
                                  if (data.token) {
                                      localStorage.setItem('token', data.token);
                                      if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                                      currentPage = 'overview';
                                      renderPage();
                                      refreshHeader();
                                  } else {
                                      alert(data.error || 'Connexion Google impossible');
                                  }
                              })
                              .catch(() => {
                                  alert('Erreur de connexion au serveur Google');
                              });
                          });
                        return;
                    }
                    tryStartGis(clientIdStored);
                });
            }

            if (phantomBtn) {
                phantomBtn.addEventListener('click', async () => {
                    try {
                        if (!window.solana || !window.solana.isPhantom) {
                            alert('Phantom Wallet n\'est pas détecté dans ce navigateur.');
                            return;
                        }
                        const resp = await window.solana.connect();
                        const walletAddress = resp.publicKey.toString();
                        const res = await fetch(`${API_BASE}/api/auth/phantom-login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ walletAddress })
                        });
                        const data = await res.json();
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                            currentPage = 'overview';
                            renderPage();
                            refreshHeader();
                        } else {
                            alert(data.error || 'Connexion Phantom impossible');
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Erreur lors de la connexion Phantom');
                    }
                });
            }
            const toggleReg = document.getElementById('toggle-register');
            const toggleLogin = document.getElementById('toggle-login');
            const registerForm = document.getElementById('register-form');
            if (toggleReg && registerForm && loginForm) {
                toggleReg.addEventListener('click', () => {
                    loginForm.style.display = 'none';

            if (toggleLogin && registerForm && loginForm) {
                toggleLogin.addEventListener('click', () => {

            if (registerForm) {

                    .then(res => res.json())
                    .then(data => {
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                            currentPage = 'overview';
                            renderPage();
                            refreshHeader();
                        } else {
                            alert(data.error || 'Inscription impossible');
                        }
                    })
                    .catch(() => alert('Erreur de connexion au serveur'))
                });
            }
        }

        function updateDashboard() {
            const token = localStorage.getItem('token');
            if (!token) return;

            fetch(`${API_BASE}/api/user/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.overall) {
                    const seasonPoints = document.getElementById('dashboard-season-points');
                    // Fallback to header value if 0 (sometimes stats might be slightly behind or structure mismatch)
                    // But preferably use the API value.
                    if (seasonPoints) {
                         const points = Math.floor(data.overall.total_points || 0);
                         seasonPoints.textContent = points;
                    }
                    
                    const totalNodes = document.getElementById('dashboard-total-nodes');
                    if (totalNodes) totalNodes.textContent = data.overall.total_sessions || 0;
                }
                if (data.today) {
                    const todayPoints = document.getElementById('dashboard-today-points');
                    if (todayPoints) todayPoints.textContent = Math.floor(data.today.today_points || 0);
                    
                    const activeNodes = document.getElementById('dashboard-active-nodes');
                    if (activeNodes) activeNodes.textContent = data.today.today_sessions || 0;
                }
            })
            .catch(err => console.error('Dashboard update error:', err));

            const select = document.getElementById('overview-chart-range');
            const tbody = document.querySelector('#overview-chart-table tbody');
            if (!select || !tbody) return;
            const granularity = select.value || 'daily';
            fetch(`${API_BASE}/api/rewards/calendar?granularity=${encodeURIComponent(granularity)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(d => {
                const list = Array.isArray(d.points) ? d.points : [];
                if (list.length > 0) {
                    const rows = list.map(p => {
                        const nodeEntry = (d.nodes || []).find(n => n.period === p.period);
                        const sessions = nodeEntry ? nodeEntry.sessions : 0;
                        return `
                            <tr>
                                <td class="date-cell">${p.period}</td>
                                <td class="network-cell">${p.points}</td>
                                <td class="referrals-cell">${sessions}</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                    return;
                }
                return fetch(`${API_BASE}/api/rewards/history?limit=500`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(hist => {
                    const rewards = Array.isArray(hist.rewards) ? hist.rewards : [];
                    const buckets = {};
                    rewards.forEach(x => {
                        const dObj = new Date(x.created_at);
                        if (Number.isNaN(dObj.getTime())) return;
                        let key;
                        if (granularity === 'yearly') {
                            key = String(dObj.getFullYear());
                        } else if (granularity === 'monthly') {
                            const m = String(dObj.getMonth() + 1).padStart(2, '0');
                            key = `${dObj.getFullYear()}-${m}`;
                        } else if (granularity === 'weekly') {
                            const tmp = new Date(Date.UTC(dObj.getFullYear(), dObj.getMonth(), dObj.getDate()));
                            const dayNum = tmp.getUTCDay() || 7;
                            tmp.setUTCDate(tmp.getUTCDate() + 4 - dayNum);
                            const isoYear = tmp.getUTCFullYear();
                            const startOfYear = new Date(Date.UTC(isoYear, 0, 1));
                            const week = Math.ceil((((tmp - startOfYear) / 86400000) + 1) / 7);
                            const wk = String(week).padStart(2, '0');
                            key = `${isoYear}-W${wk}`;
                        } else {
                            key = dObj.toISOString().slice(0, 10);
                        }
                        if (!buckets[key]) buckets[key] = { points: 0 };
                        buckets[key].points += x.amount || 0;
                    });
                    const periods = Object.keys(buckets).sort((a, b) => (a < b ? 1 : -1));
                    const rows = periods.map(period => {
                        const points = buckets[period].points;
                        return `
                            <tr>
                                <td class="date-cell">${period}</td>
                                <td class="network-cell">${points}</td>
                                <td class="referrals-cell">0</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                });
            })
            .catch(err => console.error('Calendar load error:', err));
        }

        function initializeRewardsPage() {
            const token = localStorage.getItem('token');
            if (!token) return;
            function load() {
                fetch(`${API_BASE}/api/rewards/total`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const values = document.querySelectorAll('.rewards-summary .summary-value');
                    if (values[0]) values[0].textContent = Math.floor(d.totalPoints || 0);
                }).catch(()=>{});
                fetch(`${API_BASE}/api/rewards/today`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const values = document.querySelectorAll('.rewards-summary .summary-value');
                    if (values[1]) values[1].textContent = Math.floor(d.todayPoints || 0);
                }).catch(()=>{});
                fetch(`${API_BASE}/api/rewards/history?limit=50`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const tbody = document.querySelector('.rewards-table tbody');
                    if (!tbody) return;
                    let totalNetwork = 0;
                    let totalReferrals = 0;
                    let totalBoost = 0;
                    let totalBonus = 0;
                    const rows = (d.rewards || []).map(x => {
                        const dt = new Date(x.created_at).toLocaleString();
                        const reason = (x.reason || '').toLowerCase();
                        const isNet = reason === 'network' || reason === 'proof_of_work';
                        const isRef = reason === 'referral' || reason === 'referral_bonus';
                        const isBoost = reason === 'boost';
                        const isBonus = reason === 'bonus';
                        const netVal = isNet ? x.amount : 0;
                        const refVal = isRef ? x.amount : 0;
                        const boostVal = isBoost ? x.amount : 0;
                        const bonusVal = isBonus ? x.amount : 0;
                        if (isNet) totalNetwork += x.amount;
                        if (isRef) totalReferrals += x.amount;
                        if (isBoost) totalBoost += x.amount;
                        if (isBonus) totalBonus += x.amount;
                        return `
                            <tr>
                                <td class="date-cell">${dt}</td>
                                <td class="network-cell">${netVal}</td>
                                <td class="referrals-cell">${refVal}</td>
                                <td class="boost-cell">${boostVal}</td>
                                <td class="bonus-cell">${bonusVal}</td>
                                <td class="total-cell">${x.amount}</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                    const summaryValues = document.querySelectorAll('.rewards-summary .summary-value');
                    if (summaryValues[2]) summaryValues[2].textContent = Math.floor(totalReferrals || 0);
                    if (summaryValues[3]) summaryValues[3].textContent = Math.floor(totalBoost || 0);
                    if (summaryValues[4]) summaryValues[4].textContent = Math.floor(totalBonus || 0);
                }).catch(()=>{});
            }
            load();
            if (rewardsInterval) clearInterval(rewardsInterval);
            rewardsInterval = setInterval(load, 15000);
        }

        function initializeProfilePage() {
            const token = localStorage.getItem('token');
            if (!token) return;

            const profileForm = document.getElementById('profile-form');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const solanaInput = document.getElementById('solana_address');
            const logoutBtn = document.getElementById('logout-btn');
            const setPasswordBtn = document.getElementById('set-password-btn');
            const profileRankBadge = document.getElementById('profile-rank-badge');
            const newPasswordInput = document.getElementById('new-password');
            const confirmPasswordInput = document.getElementById('confirm-password');

            // Charger les données du profil
            fetch(`${API_BASE}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.user) {
                    usernameInput.value = data.user.username;
                    emailInput.value = data.user.email;
                    solanaInput.value = data.user.solana_address || '';
                    if (profileRankBadge) {
                        const rank = (data.user.rank || 'Bronze').toLowerCase();
                        profileRankBadge.textContent = data.user.rank || 'Bronze';
                        profileRankBadge.className = 'rank-badge';
                        if (rank === 'bronze') profileRankBadge.classList.add('rank-badge-bronze');
                        else if (rank === 'silver') profileRankBadge.classList.add('rank-badge-silver');
                        else if (rank === 'gold') profileRankBadge.classList.add('rank-badge-gold');
                        else if (rank === 'platinum') profileRankBadge.classList.add('rank-badge-platinum');
                        else if (rank === 'diamond') profileRankBadge.classList.add('rank-badge-diamond');
                        profileRankBadge.style.display = 'inline-flex';
                    }
                }
            });

            // Gérer la soumission du formulaire
            profileForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const payload = {
                    username: usernameInput.value,
                    solana_address: solanaInput.value
                };

                fetch(`${API_BASE}/api/user/profile`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('Profil mis à jour avec succès!');
                    } else {
                        alert('Erreur: ' + data.error);
                    }
                });
            });

            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('token');
                window.location.reload();
            });
            if (setPasswordBtn) {
                setPasswordBtn.addEventListener('click', () => {
                    const np = newPasswordInput.value.trim();
                    const cp = confirmPasswordInput.value.trim();
                    if (!np || np.length < 6 || np !== cp) {
                        alert('Vérifier le mot de passe (min 6 caractères et confirmation identique)');
                        return;
                    }
                    fetch(`${API_BASE}/api/auth/set-password`, {
                        method: 'POST',
                        headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ newPassword: np })
                    }).then(r=>r.json()).then(data=>{
                        if (data.success) {
                            alert('Mot de passe enregistré. Vous pouvez vous connecter dans l’extension.');
                            newPasswordInput.value=''; confirmPasswordInput.value='';
                        } else { alert('Erreur: ' + (data.error||'inconnue')); }
                    });
                });
            }
        }

        function initializeEnterpriseApiPage() {
            const token = localStorage.getItem('token');
            if (!token) return;
            fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${token}` }})
            .then(r => r.json())
            .then(data => {
                const k = document.getElementById('api-key-value');
                const c = document.getElementById('api-credits');
                if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                if (c && data.credits) c.textContent = `${data.credits.used} utilisés / ${data.credits.remaining} restants`;
                if (data.requireSubscription) {
                    const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                    const wrap = document.createElement('div');
                    wrap.innerHTML = modalHtml;
                    document.body.appendChild(wrap.firstElementChild);
                    const modal = document.getElementById('subscription-modal');
                    const closeBtn = document.getElementById('subscription-close');
                    if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                    document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const link = btn.getAttribute('data-link');
                            if (link) window.open(link, '_blank');
                        });
                    });
                    let poll = setInterval(() => {
                        fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${token}` }})
                        .then(r => r.json())
                        .then(d => {
                            if (!d.requireSubscription) {
                                clearInterval(poll);
                                const m = document.getElementById('subscription-modal');
                                if (m) m.remove();
                                initializeEnterpriseApiPage();
                            }
                        }).catch(()=>{});
                    }, 3000);
                }
            }).catch(() => {});
            const copyBtn = document.getElementById('copy-api-key');
            const regenBtn = document.getElementById('regen-api-key');
            if (copyBtn) copyBtn.addEventListener('click', () => {
                const originalText = copyBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    const data = await r.json();
                    if (data.fullKey) {
                        await navigator.clipboard.writeText(data.fullKey);
                        const k = document.getElementById('api-key-value');
                        if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                        copyBtn.textContent = 'Copié';
                        const prevBg = copyBtn.style.backgroundColor;
                        copyBtn.style.backgroundColor = '#22c55e';
                        setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                    } else {
                        throw new Error('No key returned');
                    }
                }).catch(() => {
                    const prevBg = copyBtn.style.backgroundColor;
                    copyBtn.textContent = 'Erreur';
                    copyBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
            if (regenBtn) regenBtn.addEventListener('click', () => {
                const originalText = regenBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    await r.json();
                    regenBtn.textContent = 'Régénéré';
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.style.backgroundColor = '#22c55e';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                    initializeEnterpriseApiPage();
                }).catch(() => {
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.textContent = 'Erreur';
                    regenBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
        }

        function getEnterpriseSubscriptionModalHTML(plans) {
            const planCards = (plans || []).map(p => {
                const priceLabel = (p.price == null) ? 'Sur devis' : `${p.price} ${p.currency}`;
                const points = p.pointsPerMonth ? `${p.pointsPerMonth} points / mois` : '';
                const name = p.name || 'Plan';
                const recommended = /pro/i.test(name) ? ' (recommandé)' : '';
                const btnLabel = (p.price == null) ? 'Demander un devis' : 'S’abonner';
                const features = (() => {
                    if (/basic|standard/i.test(name)) return ['Accès API', 'Dashboard entreprise', 'Support standard'];
                    if (/pro/i.test(name)) return ['Priorité plus rapide', 'Accès jobs avancés', 'Support rapide'];
                    if (/business|entreprise/i.test(name)) return ['Priorité haute', 'Meilleure vitesse d’exécution', 'Support VIP', 'Export rapports'];
                    return [];
                })();
                const link = p.paymentLink || '';
                return `
                    <div class="plan-card">
                        <div class="plan-name">${name}${recommended}</div>
                        <div class="plan-price">${priceLabel}</div>
                        ${points ? `<div class="plan-points">${points}</div>` : ''}
                        <ul class="plan-features">
                            ${features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        <button class="profile-btn primary" data-link="${link}" style="font-size: 0.85em; padding: 8px 12px;">${btnLabel}</button>
                    </div>
                `;
            }).join('');
            return `
                <div id="subscription-modal" class="modal-overlay">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>Abonnements Entreprise (Système de Points)</h3>
                            <button id="subscription-close" class="profile-btn">Fermer</button>
                        </div>
                        <div class="modal-content">
                            <div class="plans-grid">
                                ${planCards}
                            </div>
                            <div class="topup-section">
                                <h4>Achat de points supplémentaires (top-up)</h4>
                                <div class="topup-grid">
                                    <div class="topup-item">10€ = 15 000 points</div>
                                    <div class="topup-item">50€ = 90 000 points</div>
                                    <div class="topup-item">100€ = 200 000 points</div>
                                </div>
                                <h4>Exemple de coût en points</h4>
                                <ul class="points-examples">
                                    <li>Compression image : 10 points</li>
                                    <li>Conversion audio : 200 points / minute</li>
                                    <li>Encodage vidéo : 500 points / minute</li>
                                    <li>OCR / PDF : 300 points</li>
                                    <li>Data job : à partir de 1000 points</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function initializeTasksPage() {
            const token = localStorage.getItem('token');
            (async () => {
                let data = null;
                try {
                    const r = await fetch(`${API_BASE}/api/tasks`);
                    if (r.ok) {
                        data = await r.json();
                    } else {
                        throw new Error('public_tasks_unavailable');
                    }
                } catch {
                    try {
                        const r2 = await fetch(`${API_BASE}/api/admin/tasks`, { headers: token ? { 'Authorization': `Bearer ${token}` } : {} });
                        if (r2.ok) {
                            const j2 = await r2.json();
                            const tasks = (j2.tasks || []).filter(x => x && (x.active === true || x.active === 1 || x.active === '1'));
                            data = { tasks };
                        } else {
                            data = { tasks: [] };
                        }
                    } catch {
                        data = { tasks: [] };
                    }
                }
                const list = document.getElementById('tasks-list');
                const typeLabels = {
                    x_follow: t('tasks.type.x_follow'),
                    x_like: t('tasks.type.x_like'),
                    telegram_join: t('tasks.type.telegram_join')
                };
                const items = (data.tasks || []).map(task => {
                    const typeLabel = typeLabels[task.type] || (task.type || '');
                    const bonus = task.reward_airdrop_bonus_percent || 0;
                    const points = task.reward_points || 0;
                    return `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-title">${task.title}</div>
                            <div class="task-desc">${task.description || ''}</div>
                            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
                                <span style="display:inline-block;padding:3px 8px;border:1px solid #334155;border-radius:9999px;background:#0b1220;color:#e5e7eb;font-size:.78rem;">${typeLabel}</span>
                                ${bonus > 0 ? `<span style="display:inline-block;padding:3px 8px;border:1px solid #14532d;border-radius:9999px;background:#052e16;color:#86efac;font-size:.78rem;">+${bonus}%</span>` : ''}
                                <span style="display:inline-block;padding:3px 8px;border:1px solid #1e3a8a;border-radius:9999px;background:#0a1229;color:#93c5fd;font-size:.78rem;">${points} pts</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="profile-btn" data-url="${task.link_url}" data-id="${task.id}">${t('tasks.validate')}</button>
                            <div class="task-timer" id="task-timer-${task.id}"></div>
                        </div>
                    </div>`;
                }).join('');
                list.innerHTML = items || `<p style="color:#9ca3af;">${t('tasks.none')}</p>`;

                // Appliquer l'état en fonction des user_tasks existants (source d'autorité)
                if (token) {
                    fetch(`${API_BASE}/api/user/tasks/status`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }).then(r => r.json()).then(j => {
                        const statuses = j.statuses || [];
                        statuses.forEach(st => {
                            const btn = list.querySelector(`button.profile-btn[data-id="${st.taskId}"]`);
                            if (!btn) return;
                            if (st.status === 'approved') {
                                btn.textContent = t('tasks.validated');
                                btn.style.backgroundColor = '#14532d';
                                btn.style.borderColor = '#14532d';
                                btn.style.cursor = 'default';
                                btn.disabled = true;
                                const timerEl = document.getElementById(`task-timer-${st.taskId}`);
                                if (timerEl) timerEl.textContent = t('tasks.validated');
                            }
                        });
                    }).catch(()=>{
                        try {
                            const uid = (window.currentUserId != null) ? String(window.currentUserId) : (currentUsername || 'anon');
                            const prefix = `task_approved_${uid}_`;
                            Object.keys(localStorage).forEach(k=>{
                                if (k && k.startsWith(prefix)) {
                                    const tid = k.slice(prefix.length);
                                    const btn = list.querySelector(`button.profile-btn[data-id="${tid}"]`);
                                    if (btn) {
                                        btn.textContent = t('tasks.validated');
                                        btn.style.backgroundColor = '#14532d';
                                        btn.style.borderColor = '#14532d';
                                        btn.style.cursor = 'default';
                                        btn.disabled = true;
                                        const timerEl = document.getElementById(`task-timer-${tid}`);
                                        if (timerEl) timerEl.textContent = t('tasks.validated');
                                    }
                                }
                            });
                            Object.keys(localStorage).forEach(k=>{
                                if (/^task_approved_\d+$/.test(k)) localStorage.removeItem(k);
                            });
                        } catch {}
                    });
                }

                list.querySelectorAll('button.profile-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const url = btn.getAttribute('data-url');
                        const id = btn.getAttribute('data-id');
                        try { if (url) window.open(url, '_blank'); } catch {}
                        const timerEl = document.getElementById(`task-timer-${id}`);
                        let s = 60;
                        timerEl.textContent = `${s}s`;
                        const iv = setInterval(() => {
                            s--; timerEl.textContent = `${s}s`;
                            if (s <= 0) {
                                clearInterval(iv);
                                fetch(`${API_BASE}/api/user/tasks/approve`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ taskId: id })
                                }).then(async (r) => {
                                    let ok = r.ok;
                                    let j = null;
                                    try { j = await r.json(); } catch {}
                                    if (!ok || (j && j.error)) {
                                        timerEl.textContent = t('tasks.error');
                                        return;
                                    }
                                    const approved = j && (j.status === 'approved' || j.success === true);
                                    if (!approved) { timerEl.textContent = t('tasks.error'); return; }
                                    timerEl.textContent = t('tasks.validated');
                                    btn.textContent = t('tasks.validated');
                                    btn.style.backgroundColor = '#14532d';
                                    btn.style.borderColor = '#14532d';
                                    btn.style.cursor = 'default';
                                    btn.disabled = true;
                                    try { refreshHeader(); } catch {}
                                    try { 
                                        const uid = (window.currentUserId != null) ? String(window.currentUserId) : (currentUsername || 'anon');
                                        localStorage.setItem(`task_approved_${uid}_${id}`, '1'); 
                                    } catch {}
                                }).catch(() => {
                                    timerEl.textContent = t('tasks.error');
                                });
                            }
                        }, 1000);
                    });
                });
            })();
        }

        function initializeDownloadPage() {
            const btnExt = document.getElementById('btn-open-extensions');
            const btnHow = document.getElementById('btn-howto');
            if (btnExt) btnExt.addEventListener('click', async () => {
                const localRar = 'chrome-extension.rar';
                const localCrx = 'chrome-extension.crx';
                const apiZip = `${API_BASE}/api/download/extension`;
                const ghZip = 'https://github.com/Azurus333/Revolution-Network/archive/refs/heads/main.zip';
                async function headOk(url) { try { const r = await fetch(url, { method: 'HEAD' }); return r.ok; } catch { return false; } }
                let url = '';
                if (await headOk(localRar)) url = localRar;
                else if (await headOk(localCrx)) url = localCrx;
                else if (await headOk(apiZip)) url = apiZip;
                else url = ghZip;
                try {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = url.endsWith('.rar') ? 'chrome-extension.rar'
                               : url.endsWith('.crx') ? 'chrome-extension.crx'
                               : url.endsWith('.zip') ? 'revolution-chrome-extension.zip'
                               : '';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(()=>{ try { document.body.removeChild(a); } catch {} }, 0);
                } catch {
                    try { window.open(url, '_blank'); } catch {}
                }
                setTimeout(()=>{ try { window.open('chrome://extensions/', '_blank'); } catch {} }, 500);
            });
            if (btnHow) btnHow.addEventListener('click', () => {
                alert(t('download.quickGuideMessage'));
            });
            const gallery = document.getElementById('download-gallery');
            const modal = document.getElementById('image-viewer-modal');
            const imgEl = document.getElementById('image-viewer-img');
            const capEl = document.getElementById('image-viewer-caption');
            const prevBtn = document.getElementById('img-prev');
            const nextBtn = document.getElementById('img-next');
            const closeBtn = document.getElementById('img-close');
            if (gallery && modal && imgEl && capEl && prevBtn && nextBtn && closeBtn) {
                const imgs = Array.from(gallery.querySelectorAll('img'));
                const list = imgs.map(i => ({ src: i.getAttribute('src'), alt: i.getAttribute('alt') || '' }));
                let idx = 0;
                function show(i) {
                    if (!list.length) return;
                    idx = (i + list.length) % list.length;
                    const item = list[idx];
                    imgEl.src = item.src;
                    imgEl.alt = item.alt;
                    capEl.textContent = item.alt || '';
                }
                function open(i, fromImg) {
                    if (fromImg && fromImg.src) {
                        imgEl.src = fromImg.src;
                        imgEl.alt = fromImg.alt || '';
                        capEl.textContent = fromImg.alt || '';
                        idx = i;
                    } else {
                        show(i);
                    }
                    modal.classList.add('open');
                    document.body.style.overflow = 'hidden';
                    document.addEventListener('keydown', onKey);
                }
                function close() {
                    modal.classList.remove('open');
                    document.body.style.overflow = 'auto';
                    document.removeEventListener('keydown', onKey);
                }
                function onKey(e) {
                    if (e.key === 'Escape') close();
                    else if (e.key === 'ArrowLeft') show(idx - 1);
                    else if (e.key === 'ArrowRight') show(idx + 1);
                }
                imgs.forEach((img, i) => {
                    img.style.cursor = 'zoom-in';
                    img.addEventListener('click', () => open(i, img));
                });
                prevBtn.addEventListener('click', () => show(idx - 1));
                nextBtn.addEventListener('click', () => show(idx + 1));
                closeBtn.addEventListener('click', close);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) close();
                });
            }
        }

    try { meta = JSON.parse(item.metadata || '{}'); } catch { if (typeof item.metadata === 'object' && item.metadata) meta = item.metadata; }
    if (item.type === 'subscription') {
        actionButton = `<button class="profile-btn primary" onclick="closeShopItemModal(); openPlansModal();" style="font-size: 0.85em; padding: 8px 12px;">${t('subscription.subscribe')}</button>`;
    } else if (item.type === 'presale') {

    } else if (item.type === 'auto_mining') {

    } else if (item.type === 'node_nft') {

    } else {
        actionButton = `<button class="profile-btn primary" onclick="window.open('https://buy.stripe.com/test_shop_item_${item.id}', '_blank')">${t('shop.buy_now')}</button>`;
    }

        <div class="shop-detail-price" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: (item.currency || 'EUR') }).format(parseFloat(item.price || 0)).replace(/\u00A0/g,' ')}</div>

            ${actionButton}
        </div>

    const buyBtn = document.getElementById('buy-btn');
            if (buyBtn) {
        buyBtn.addEventListener('click', () => {
            const token = localStorage.getItem('token');
            if (!token) { alert('Veuillez vous connecter'); return; }
            let m = {};
            try { m = JSON.parse(item.metadata || '{}'); } catch { if (typeof item.metadata === 'object' && item.metadata) m = item.metadata; }
            let link = m.paymentLink || m.stripeLink || m.link || m.payment || m.url || '';
            if (!link) {
                try {
                    const rx = /(https?:\/\/[^\s)"]+)/i;
                    const d = String(item.description || '');
                    const m2 = d.match(rx);
                    if (m2) link = m2[1];
                } catch {}
            }
            if (item.type === 'node_nft' && !link) {
                link = 'https://buy.stripe.com/6oU8wO4Qxcrjfy7aun6oo05';
            }
            if (item.type === 'presale' || item.type === 'node_nft') {
                if (!link) { alert('Lien de paiement indisponible'); return; }
                try {
                    const a = document.createElement('a');
                    a.href = link;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.style.display = 'none';
                    document.body.appendChild(a);

                    setTimeout(()=>{ try { document.body.removeChild(a); } catch {} }, 0);
                } catch {
                    try { window.open(link, '_blank', 'noopener,noreferrer'); } catch {}
                }
            }
            let payload = {};
            const qtyEl = document.getElementById('buy-qty');
            if (qtyEl) {
                const minQty = Number.isFinite(parseFloat(m.minQty)) ? parseFloat(m.minQty) : 50;
                const q = parseFloat(qtyEl.value || String(minQty));
                const rounded = Math.round(q / 50) * 50;
                payload.qty = Math.max(minQty, rounded);
            }
            fetch(`${API_BASE}/api/shop/buy/${item.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },

                try { refreshHeader(); } catch {}
                closeShopItemModal();
            }).catch((e) => console.warn('Erreur réseau', e));
        });
