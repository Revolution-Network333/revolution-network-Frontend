function openShopItemModal(itemId) {
    const item = currentShopItems.find(i => i.id === itemId);
    if (!item) return;

    const modal = document.getElementById('shop-item-modal');
    const title = document.getElementById('shop-modal-title');
    const details = document.getElementById('shop-modal-details');

    title.innerText = item.title || item.name;
    
    let actionButton = '';
    let extraControls = '';
    let meta = {};
    try { meta = JSON.parse(item.metadata || '{}'); } catch { if (typeof item.metadata === 'object' && item.metadata) meta = item.metadata; }
    if (item.type === 'subscription') {
        actionButton = `<button class="profile-btn primary" onclick="closeShopItemModal(); openPlansModal();" style="font-size: 0.85em; padding: 8px 12px;">${t('subscription.subscribe')}</button>`;
    } else if (item.type === 'presale') {
        const minQty = Number.isFinite(parseFloat(meta.minQty)) ? parseFloat(meta.minQty) : 50;
        if (meta.isPack) {
            extraControls = `
                <div class="profile-field">
                    <label>Quantité incluse</label>
                    <input type="text" id="buy-qty" value="${minQty}" disabled style="opacity:0.8;font-weight:bold;">
                    <div style="font-size:0.8rem;color:#9ca3af;margin-top:4px;">Ce pack contient ${minQty} tokens.</div>
                </div>`;
        } else {
            extraControls = `
                <div class="profile-field">
                    <label>${t('shop.quantity')}</label>
                    <input type="number" id="buy-qty" step="50" min="${minQty}" value="${minQty}">
                </div>`;
        }
        actionButton = `<button class="profile-btn primary" id="buy-btn">${t('shop.buy')}</button>`;
    } else if (item.type === 'vpn') {
        actionButton = `<button class="profile-btn primary" id="buy-btn">${t('shop.activate_vpn')}</button>`;
    } else if (item.type === 'auto_mining') {
        actionButton = `<button class="profile-btn primary" id="buy-btn">${t('shop.activate_auto')}</button>`;
    } else if (item.type === 'node_nft') {
        actionButton = `<button class="profile-btn primary" id="buy-btn">${t('shop.buy')}</button>`;
    } else {
        actionButton = `<button class="profile-btn primary" onclick="window.open('https://buy.stripe.com/test_shop_item_${item.id}', '_blank')">${t('shop.buy_now')}</button>`;
    }

    details.innerHTML = `
        <div class="shop-detail-type" style="text-transform: uppercase; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">${item.type}</div>
        <div class="shop-detail-price" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: (item.currency || 'EUR') }).format(parseFloat(item.price || 0)).replace(/\u00A0/g,' ')}</div>
        <div class="shop-detail-desc" style="color: #9ca3af; margin-bottom: 2rem; line-height: 1.6;">${item.description || t('shop.no_description')}</div>
        ${extraControls}
        <div class="shop-detail-actions">
            ${actionButton}
        </div>
    `;
    const buyBtn = document.getElementById('buy-btn');
            if (buyBtn) {
        buyBtn.addEventListener('click', () => {
            const token = localStorage.getItem('token');
            if (!token) { alert(t('shop.login_required')); return; }
            let m = {};
            try { m = JSON.parse(item.metadata || '{}'); } catch { if (typeof item.metadata === 'object' && item.metadata) m = item.metadata; }
            let payload = {};
            const qtyEl = document.getElementById('buy-qty');
            if (qtyEl) {
                const minQty = Number.isFinite(parseFloat(m.minQty)) ? parseFloat(m.minQty) : 50;
                const q = parseFloat(qtyEl.value || String(minQty));
                const rounded = Math.round(q / 50) * 50;
                payload.qty = Math.max(minQty, rounded);
            }

            let fallbackLink = '';
            try { fallbackLink = (m && (m.paymentLink || m.stripeLink || m.link || m.payment || m.url)) ? String(m.paymentLink || m.stripeLink || m.link || m.payment || m.url) : ''; } catch {}
            if (!fallbackLink) {
                try {
                    const rx = /(https?:\/\/[^\s)"]+)/i;
                    const d = String(item.description || '');
                    const m2 = d.match(rx);
                    if (m2) fallbackLink = m2[1];
                } catch {}
            }
            if (item.type === 'node_nft' && !fallbackLink) {
                fallbackLink = 'https://buy.stripe.com/dRm6oJcbg53X0Uef0A4gg00';
            }
            fetch(`${API_BASE}/api/shop/buy/${item.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            }).then(async (r) => {
                const j = await r.json().catch(()=>({}));
                if (!r.ok || j.error) {
                    if (fallbackLink) {
                        try { window.open(fallbackLink, '_blank', 'noopener,noreferrer'); } catch {}
                    } else {
                        console.warn('Order creation failed:', j.error || r.status);
                    }
                    return;
                }
                if (j.checkoutUrl) {
                    try { window.open(j.checkoutUrl, '_blank', 'noopener,noreferrer'); } catch {}
                } else if (fallbackLink && j.requiresPayment) {
                    const uid = window.currentUserId || (token ? JSON.parse(atob(token.split('.')[1])).userId : null);
                    let url = String(fallbackLink);
                    if (uid) {
                        const separator = url.includes('?') ? '&' : '?';
                        url += `${separator}client_reference_id=${uid}`;
                    }
                    try { window.open(url, '_blank', 'noopener,noreferrer'); } catch {}
                } else if (j.requiresPayment) {
                    alert(t('shop.payment.not_configured'));
                }
                try {
                    const banner = document.createElement('div');
                    banner.textContent = (j.requiresPayment && j.order) ? t('shop.order.created_pending') : t('shop.order.saved');
                    banner.style = 'position:fixed;top:12px;right:12px;background:#111827;color:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:9999;font-size:.9rem;';
                    document.body.appendChild(banner);
                    setTimeout(()=>{ try { document.body.removeChild(banner); } catch {} }, 3500);
                } catch {}
                if (!j.requiresPayment) {
                    try { refreshHeader(); } catch {}
                    closeShopItemModal();
                }
            }).catch((e) => console.warn('Erreur réseau', e));
        });
    }

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

    if (!fallbackLink) {

    }).then(async (r) => {

        if (j.checkoutUrl) {

            if (uid) {
                const separator = url.includes('?') ? '&' : '?';
                url += `${separator}client_reference_id=${uid}`;
            }
            try { window.open(url, '_blank', 'noopener,noreferrer'); } catch {}
        } else if (j.requiresPayment) {
            alert(t('shop.payment.not_configured'));
        }
        try {
            const banner = document.createElement('div');
            banner.textContent = (j.requiresPayment && j.order) ? t('shop.order.opened_pending') : t('shop.payment.opened');
            banner.style = 'position:fixed;top:12px;right:12px;background:#111827;color:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:9999;font-size:.9rem;';
            document.body.appendChild(banner);
            setTimeout(()=>{ try { document.body.removeChild(banner); } catch {} }, 3500);
        } catch {}
        if (!j.requiresPayment) {
            try { refreshHeader(); } catch {}
        }
    }).catch(() => console.warn('Erreur réseau'));
}

        function initializeAdminShopPage() {
            const token = localStorage.getItem('token');
            const tbody = document.querySelector('#admin-shop-table tbody');
            
            // Helper to toggle form fields based on type
            function updateFormVisibility() {
                const type = document.getElementById('shop-type').value;
                const isPack = document.getElementById('shop-is-pack').value === '1';
                
                const show = (selector, visible) => {
                    const el = document.querySelector(selector);
                    if (el) el.closest('div').style.display = visible ? 'block' : 'none';
                };

                // Defaults: hide all specific fields
                show('#shop-gb', false);
                show('#shop-priority', false);
                show('#shop-payment-link', false);
                show('#shop-stripe-price-id', false);
                show('#shop-proxy-host', false);
                show('#shop-proxy-port', false);
                show('#shop-token-symbol', false);
                show('#shop-unit-price', false);
                show('#shop-min-qty', false);
                show('#shop-max-qty', false);
                show('#shop-is-pack', false);
                show('#shop-pack-amount', false);
                show('#shop-admin-only', true); // Always show

                if (type === 'subscription') {
                    show('#shop-gb', true);
                    show('#shop-priority', true);
                    show('#shop-payment-link', true);
                    show('#shop-stripe-price-id', true);
                } else if (type === 'vpn') {
                    show('#shop-proxy-host', true);
                    show('#shop-proxy-port', true);
                } else if (type === 'presale') {
                    show('#shop-token-symbol', true);
                    show('#shop-is-pack', true);
                    if (isPack) {
                        show('#shop-pack-amount', true);
                        show('#shop-payment-link', true);
                        // Hide unit/qty fields in pack mode to simplify
                        show('#shop-unit-price', false);
                        show('#shop-min-qty', false);
                        show('#shop-max-qty', false);
                    } else {
                        show('#shop-pack-amount', false);
                        show('#shop-payment-link', false);
                        show('#shop-unit-price', true);
                        show('#shop-min-qty', true);
                        show('#shop-max-qty', true);
                    }
                } else if (type === 'node_nft') {
                     show('#shop-payment-link', true);
                }
            }

            // Attach listeners for visibility
            const typeSelect = document.getElementById('shop-type');
            const isPackSelect = document.getElementById('shop-is-pack');
            if (typeSelect) typeSelect.addEventListener('change', updateFormVisibility);
            if (isPackSelect) isPackSelect.addEventListener('change', updateFormVisibility);

            async function apiFetchAuth(url, options = {}) {
                const t = localStorage.getItem('token');
                const rt = localStorage.getItem('refreshToken');
                const opts = { ...options, headers: { ...(options.headers || {}), 'Authorization': `Bearer ${t}` } };
                let res = await fetch(url, opts);
                if ((res.status === 401 || res.status === 403) && rt) {
                    const rf = await fetch(`${API_BASE}/api/auth/refresh`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refreshToken: rt })
                    });
                    if (rf.ok) {
                        const j = await rf.json();
                        if (j.token) {
                            localStorage.setItem('token', j.token);
                            const opts2 = { ...options, headers: { ...(options.headers || {}), 'Authorization': `Bearer ${j.token}` } };
                            res = await fetch(url, opts2);
                        }
                    }
                }
                return res;
            }
            function load() {
                apiFetchAuth(`${API_BASE}/api/admin/shop/items`)
                    .then(r => r.json())
                    .then(data => {
                        const items = data.items || [];
                            const fmt = (v) => {
                                try { const n = parseFloat(v); if (!isFinite(n)) return v; return (Math.round(n * 100) / 100).toString().replace('.', ','); } catch { return v; }
                            };
                            tbody.innerHTML = items.map(i => `
                            <tr data-id="${i.id}">
                                <td contenteditable="true" data-field="title">${i.title || ''}</td>
                                <td>
                                    <select data-field="type" value="${i.type || 'subscription'}">
                                        <option value="subscription" ${i.type==='subscription'?'selected':''}>Abonnement</option>
                                        <option value="presale" ${i.type==='presale'?'selected':''}>Prévente Crypto</option>
                                        <option value="node_nft" ${i.type==='node_nft'?'selected':''}>Node (Passif)</option>
                                        <option value="nft" ${i.type==='nft'?'selected':''}>NFT</option>
                                        <option value="merch" ${i.type==='merch'?'selected':''}>Merch</option>
                                    </select>
                                </td>
                                    <td contenteditable="true" data-field="price">${fmt(i.price || 0)}</td>
                                <td contenteditable="true" data-field="currency">${i.currency || 'EUR'}</td>
                                <td>
                                    <select data-field="active">
                                        <option value="1" ${i.active ? 'selected' : ''}>Oui</option>
                                        <option value="0" ${!i.active ? 'selected' : ''}>Non</option>
                                    </select>
                                </td>
                                <td contenteditable="true" data-field="description">${i.description || ''}</td>
                                <td data-field="metadata" style="display:none;">${i.metadata || ''}</td>
                                <td>
                                    <button class="profile-btn" data-action="edit">Éditer</button>
                                    <button class="profile-btn danger" data-action="delete">Supprimer</button>
                                </td>
                            </tr>
                        `).join('');
                        attachInlineHandlers();
                        attachRowActions();
                    }).catch(() => { tbody.innerHTML = ''; });
            }
            function attachInlineHandlers() {
                tbody.querySelectorAll('[contenteditable][data-field]').forEach(cell => {
                    cell.addEventListener('blur', () => {
                        const tr = cell.closest('tr');
                        const id = tr.getAttribute('data-id');
                        const field = cell.getAttribute('data-field');
                        let value = cell.textContent.trim();
                            if (field === 'price') {
                                value = value.replace(/\s/g, '').replace(',', '.').replace(/[^0-9.\-]/g, '');
                                value = parseFloat(value) || 0;
                            }
                        updateItemPartial(id, { [field]: value });
                    });
                });
                tbody.querySelectorAll('select[data-field]').forEach(sel => {
                    sel.addEventListener('change', () => {
                        const tr = sel.closest('tr');
                        const id = tr.getAttribute('data-id');
                        const field = sel.getAttribute('data-field');
                        const value = sel.value;
                        updateItemPartial(id, { [field]: field === 'active' ? (value==='1') : value });
                    });
                });
            }
            function attachRowActions() {
                tbody.querySelectorAll('button[data-action="edit"]').forEach(btn => {
                    btn.addEventListener('click', () => openEditModal(btn.closest('tr')));
                });
                tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tr = btn.closest('tr');
                        const id = tr.getAttribute('data-id');
                        apiFetchAuth(`${API_BASE}/api/admin/shop/items/${id}`, { method: 'DELETE' }).then(() => load());
                    });
                });
            }
            const resetBtn = document.getElementById('reset-shop-items');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    if (!confirm('Supprimer toutes les annonces et recréer les 3 abonnements ?')) return;
                    apiFetchAuth(`${API_BASE}/api/admin/shop/reset`, { method: 'POST' })
                        .then(res => {
                            if (res.ok) load();
                            else alert('Échec de la réinitialisation');
                        }).catch(()=>alert('Erreur réseau'));
                });
            }
            function updateItemPartial(id, patch) {
                apiFetchAuth(`${API_BASE}/api/admin/shop/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patch)
                }).then(async (res) => {
                    if (!res.ok) {
                        try { const j = await res.json(); alert(j.error || 'Échec de la mise à jour'); } catch { alert('Échec de la mise à jour'); }
                    }
                }).catch(() => { alert('Erreur réseau'); });
            }
            function openEditModal(tr) {
                const id = tr.getAttribute('data-id');
                const modal = document.getElementById('shop-edit-modal');
                const title = document.getElementById('shop-title');
                const type = document.getElementById('shop-type');
                const price = document.getElementById('shop-price');
                const currency = document.getElementById('shop-currency');
                const active = document.getElementById('shop-active');
                const description = document.getElementById('shop-description');
                const gb = document.getElementById('shop-gb');
                const priority = document.getElementById('shop-priority');
                const payment = document.getElementById('shop-payment-link');
                const stripePriceId = document.getElementById('shop-stripe-price-id');
                const isPack = document.getElementById('shop-is-pack');
                const packAmount = document.getElementById('shop-pack-amount');
                title.value = tr.querySelector('[data-field="title"]').textContent.trim();
                type.value = tr.querySelector('select[data-field="type"]').value;
                price.value = tr.querySelector('[data-field="price"]').textContent.trim();
                currency.value = tr.querySelector('[data-field="currency"]').textContent.trim() || 'EUR';
                active.value = tr.querySelector('select[data-field="active"]').value;
                description.value = tr.querySelector('[data-field="description"]').textContent.trim();
                gb.value = '';
                priority.value = '1';
                payment.value = '';
                stripePriceId.value = '';
                isPack.value = '0';
                packAmount.value = '';
                try {
                    const metaCell = tr.querySelector('[data-field="metadata"]');
                    if (metaCell) {
                        const meta = JSON.parse(metaCell.textContent || '{}');
                        gb.value = meta.gbPerMonth || '';
                        priority.value = meta.priority_level || '1';
                        payment.value = meta.paymentLink || '';
                        stripePriceId.value = meta.stripePriceId || meta.priceId || meta.stripe_price_id || '';
                        document.getElementById('shop-token-symbol').value = meta.tokenSymbol || '';
                        document.getElementById('shop-unit-price').value = meta.unitPrice || '';
                        document.getElementById('shop-min-qty').value = meta.minQty || '';
                        document.getElementById('shop-max-qty').value = meta.maxQty || '';
                        document.getElementById('shop-admin-only').value = meta.adminOnly ? '1' : '0';
                        isPack.value = meta.isPack ? '1' : '0';
                        packAmount.value = meta.packAmount || '';
                    }
                } catch {}
                modal.dataset.id = id;
                updateFormVisibility();
                modal.classList.add('open');
            }
            function closeEditModal() {
                const modal = document.getElementById('shop-edit-modal');
                modal.classList.remove('open');
            }
            function saveEditModal() {
                const token = localStorage.getItem('token');
                const modal = document.getElementById('shop-edit-modal');
                const id = modal.dataset.id;
                const isPackVal = document.getElementById('shop-is-pack').value === '1';
                const packAmountVal = parseInt(document.getElementById('shop-pack-amount').value || '0');
                const price = parseFloat(document.getElementById('shop-price').value) || 0;
                let unitPrice = parseFloat(document.getElementById('shop-unit-price').value || '0');
                let minQty = parseInt(document.getElementById('shop-min-qty').value || '0');
                let maxQty = parseInt(document.getElementById('shop-max-qty').value || '0');

                if (isPackVal && packAmountVal > 0) {
                    minQty = packAmountVal;
                    maxQty = packAmountVal;
                    unitPrice = price / packAmountVal;
                }

                const payload = {
                    title: document.getElementById('shop-title').value,
                    type: document.getElementById('shop-type').value,
                    price: price,
                    currency: document.getElementById('shop-currency').value || 'EUR',
                    active: document.getElementById('shop-active').value === '1',
                    description: document.getElementById('shop-description').value,
                    metadata: JSON.stringify({
                        gbPerMonth: parseInt(document.getElementById('shop-gb').value || '0') || undefined,
                        priority_level: parseInt(document.getElementById('shop-priority').value || '1') || 1,
                        paymentLink: (document.getElementById('shop-payment-link').value || '').trim() || undefined,
                        stripeLink: (document.getElementById('shop-payment-link').value || '').trim() || undefined,
                        stripePriceId: (document.getElementById('shop-stripe-price-id').value || '').trim() || undefined,
                        proxyHost: (document.getElementById('shop-proxy-host').value || '').trim() || undefined,
                        proxyPort: parseInt(document.getElementById('shop-proxy-port').value || '0') || undefined,
                        tokenSymbol: (document.getElementById('shop-token-symbol').value || '').trim() || undefined,
                        unitPrice: unitPrice || undefined,
                        minQty: minQty || undefined,
                        maxQty: maxQty || undefined,
                        adminOnly: document.getElementById('shop-admin-only').value === '1' || undefined,
                        isPack: isPackVal || undefined,
                        packAmount: packAmountVal || undefined
                    })
                };
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_BASE}/api/admin/shop/items/${id}` : `${API_BASE}/api/admin/shop/items`;
                apiFetchAuth(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(async (res) => {
                    if (res.ok) { closeEditModal(); load(); }
                    else {
                        let msg = 'Enregistrement impossible';
                        try { const j = await res.json(); msg = j.error || msg; } catch {}
                        alert(msg);
                    }
                }).catch(() => { alert('Erreur réseau lors de l’enregistrement'); });
            }
            const addBtn = document.getElementById('add-shop-item');
            const saveBtn = document.getElementById('save-shop-item');
            const closeBtn = document.getElementById('close-shop-edit');
            if (addBtn) addBtn.addEventListener('click', () => {
                const modal = document.getElementById('shop-edit-modal');
                modal.dataset.id = '';
                ['shop-title','shop-type','shop-price','shop-currency','shop-active','shop-description'].forEach(id => {
                    const el = document.getElementById(id);
                    if (id==='shop-type') el.value = 'subscription';
                    else if (id==='shop-currency') el.value = 'EUR';
                    else if (id==='shop-active') el.value = '1';
                    else el.value = '';
                });
                updateFormVisibility();
                modal.classList.add('open');
            });
            if (saveBtn) saveBtn.addEventListener('click', saveEditModal);
            if (closeBtn) closeBtn.addEventListener('click', () => {
                const modal = document.getElementById('shop-edit-modal');
                modal.classList.remove('open');
            });
            load();
        }

        function initializeAdminTasksPage() {
            const token = localStorage.getItem('token');
            const tbody = document.querySelector('#admin-tasks-table tbody');
            const repairBtn = document.getElementById('repair-user-tasks');
            if (repairBtn) {
                repairBtn.addEventListener('click', async ()=>{
                    const originalText = repairBtn.textContent;
                    try {
                        repairBtn.disabled = true;
                        repairBtn.classList.remove('primary','danger');
                        repairBtn.classList.add('secondary');
                        repairBtn.textContent = 'Réparation complète...';
                        
                        const r = await fetch(`${API_BASE}/api/admin/tasks/repair-all`, { 
                            method:'POST', 
                            headers:{ 'Authorization': `Bearer ${token}` }
                        });
                        const j = await r.json().catch(()=>({}));
                        
                        if (j.success) {
                            let message = `Réparation terminée!\n`;
                            message += `Tables: ${j.results.tables.length}\n`;
                            message += `Tasks fixed: ${j.results.tasks.length}\n`;
                            message += `Total tasks: ${j.results.summary.total_tasks}\n`;
                            message += `Active tasks: ${j.results.summary.active_tasks}`;
                            
                            alert(message);
                            repairBtn.textContent = 'Réparation réussie';
                            repairBtn.classList.remove('secondary');
                            repairBtn.classList.add('primary');
                            
                            // Reload tasks to show updated data
                            loadTasks();
                        } else {
                            alert(`Erreur: ${j.error || 'Échec de la réparation'}`);
                            repairBtn.textContent = 'Échec';
                            repairBtn.classList.remove('secondary');
                            repairBtn.classList.add('danger');
                        }
                    } catch (e) {
                        alert(`Erreur: ${e.message}`);
                        repairBtn.textContent = t('common.error');
                        repairBtn.classList.remove('secondary');
                        repairBtn.classList.add('danger');
                    } finally {
                        setTimeout(()=>{
                            repairBtn.textContent = originalText;
                            repairBtn.disabled = false;
                            repairBtn.classList.remove('primary','danger');
                            repairBtn.classList.add('secondary');
                        }, 3000);
                    }
                });
            }
            function loadTasks() {
                fetch(`${API_BASE}/api/admin/tasks`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r=>r.json())
                .then(data=>{
                    tbody.innerHTML = (data.tasks||[]).map(t=>`
                        <tr data-id="${t.id}">
                            <td contenteditable="true" data-field="title">${t.title||''}</td>
                            <td>
                                <select data-field="type" value="${t.type||'x_follow'}">
                                    <option value="x_follow" ${t.type==='x_follow'?'selected':''}>X Follow</option>
                                    <option value="x_like" ${t.type==='x_like'?'selected':''}>X Like</option>
                                    <option value="telegram_join" ${t.type==='telegram_join'?'selected':''}>Telegram Join</option>
                                    <option value="twofa_enable" ${t.type==='twofa_enable'?'selected':''}>Validé 2FA</option>
                                </select>
                            </td>
                            <td contenteditable="true" data-field="reward_points">${t.reward_points||0}</td>
                            <td contenteditable="true" data-field="reward_airdrop_bonus_percent">${t.reward_airdrop_bonus_percent||0}</td>
                            <td contenteditable="true" data-field="link_url">${t.link_url||''}</td>
                            <td>
                                <select data-field="active">
                                    <option value="1" ${t.active ? 'selected' : ''}>Oui</option>
                                    <option value="0" ${!t.active ? 'selected' : ''}>Non</option>
                                </select>
                            </td>
                            <td>
                                <button class="profile-btn" data-action="edit">Éditer</button>
                                <button class="profile-btn danger" data-action="delete">Supprimer</button>
                            </td>
                        </tr>
                    `).join('');
                    attachInlineHandlers();
                    attachRowActions();
                });
            }
            function attachInlineHandlers() {
                tbody.querySelectorAll('[contenteditable][data-field]').forEach(cell=>{
                    cell.addEventListener('blur', ()=>{
                        const tr = cell.closest('tr'); const id = tr.getAttribute('data-id');
                        const field = cell.getAttribute('data-field'); let value = cell.textContent.trim();
                        if (field==='reward_points'||field==='reward_airdrop_bonus_percent') value = parseInt(value)||0;
                        updateTaskPartial(id, { [field]: value });
                    });
                });
                tbody.querySelectorAll('select[data-field]').forEach(sel=>{
                    sel.addEventListener('change', ()=>{
                        const tr = sel.closest('tr'); const id = tr.getAttribute('data-id');
                        const field = sel.getAttribute('data-field'); const value = sel.value;
                        updateTaskPartial(id, { [field]: field==='active' ? (value==='1') : value });
                    });
                });
            }
            function attachRowActions() {
                tbody.querySelectorAll('button[data-action="edit"]').forEach(btn=>{
                    btn.addEventListener('click', ()=>{
                        const tr = btn.closest('tr'); openTaskModal(tr);
                    });
                });
                tbody.querySelectorAll('button[data-action="delete"]').forEach(btn=>{
                    btn.addEventListener('click', ()=>{
                        const id = btn.closest('tr').getAttribute('data-id');
                        fetch(`${API_BASE}/api/admin/tasks/${id}`, { method:'DELETE', headers:{ 'Authorization': `Bearer ${token}` }})
                        .then(()=>loadTasks());
                    });
                });
            }
            function updateTaskPartial(id, patch) {
                fetch(`${API_BASE}/api/admin/tasks/${id}`, {
                    method:'PUT',
                    headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(patch)
                }).then(()=>{});
            }
            function openTaskModal(tr) {
                const modal = document.getElementById('task-edit-modal');
                modal.dataset.id = tr.getAttribute('data-id');
                document.getElementById('task-title').value = tr.querySelector('[data-field="title"]').textContent.trim();
                document.getElementById('task-type').value = tr.querySelector('select[data-field="type"]').value;
                document.getElementById('task-points').value = tr.querySelector('[data-field="reward_points"]').textContent.trim();
                document.getElementById('task-bonus').value = tr.querySelector('[data-field="reward_airdrop_bonus_percent"]').textContent.trim();
                document.getElementById('task-link').value = tr.querySelector('[data-field="link_url"]').textContent.trim();
                document.getElementById('task-active').value = tr.querySelector('select[data-field="active"]').value;
                modal.classList.add('open');
            }
            function closeTaskModal() { document.getElementById('task-edit-modal').classList.remove('open'); }
            function saveTask() {
                const id = document.getElementById('task-edit-modal').dataset.id;
                const payload = {
                    title: document.getElementById('task-title').value,
                    type: document.getElementById('task-type').value,
                    reward_points: parseInt(document.getElementById('task-points').value)||0,
                    reward_airdrop_bonus_percent: parseInt(document.getElementById('task-bonus').value)||0,
                    link_url: document.getElementById('task-link').value,
                    active: document.getElementById('task-active').value === '1',
                    description: document.getElementById('task-desc').value
                };
                
                console.log('Saving task:', payload);
                
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_BASE}/api/admin/tasks/${id}` : `${API_BASE}/api/admin/tasks`;
                
                fetch(url, { method, headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload) })
                .then(async (res) => {
                    console.log('Task save response:', res.status);
                    if (!res.ok) {
                        const error = await res.json().catch(() => ({}));
                        console.error('Task save error:', error);
                        alert(`Erreur: ${error.error || 'Échec de la sauvegarde'}`);
                        return;
                    }
                    closeTaskModal(); 
                    loadTasks();
                })
                .catch(err => {
                    console.error('Task save fetch error:', err);
                    alert(`Erreur réseau: ${err.message}`);
                });
            }
            function loadPendingUserTasks() {
                const tbody = document.querySelector('#pending-user-tasks tbody');
                fetch(`${API_BASE}/api/admin/user-tasks?status=not_started`, { headers:{ 'Authorization': `Bearer ${token}` }})
                .then(r=>r.json()).then(data=>{
                    tbody.innerHTML = (data.userTasks||[]).map(ut=>`
                        <tr data-id="${ut.id}">
                            <td>${ut.user_id}</td><td>${ut.title}</td><td>${ut.status}</td><td>${ut.reward_points}</td>
                            <td><button class="profile-btn" data-action="approve">Valider</button></td>
                        </tr>
                    `).join('');
                    tbody.querySelectorAll('button[data-action="approve"]').forEach(btn=>{
                        btn.addEventListener('click', ()=>{
                            const id = btn.closest('tr').getAttribute('data-id');
                            fetch(`${API_BASE}/api/admin/user-tasks/${id}/approve`, { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }})
                            .then(()=>{ loadPendingUserTasks(); try { refreshHeader(); } catch {} });
                        });
                    });
                });
            }
            const addBtn = document.getElementById('add-task-btn');
            const saveBtn = document.getElementById('save-task-btn');
            const closeBtn = document.getElementById('close-task-btn');
            if (addBtn) addBtn.addEventListener('click', ()=>{ const m = document.getElementById('task-edit-modal'); m.dataset.id=''; m.classList.add('open'); });
            if (saveBtn) saveBtn.addEventListener('click', saveTask);
            if (closeBtn) closeBtn.addEventListener('click', closeTaskModal);
            loadTasks(); loadPendingUserTasks();
        }

            const unstakeBtn = document.getElementById('unstake-btn');
            const withdrawBtn = document.getElementById('withdraw-btn');
            const withdrawAmt = document.getElementById('withdraw-amount');
            function refresh() {
                fetch(`${API_BASE}/api/wallet/balance`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r => r.json()).then(j => {
                    const bal = (j.balanceAth||0);
                    if (balEl) balEl.textContent = bal.toLocaleString(undefined,{maximumFractionDigits:8});
                    if (stakeBalEl) stakeBalEl.textContent = bal.toLocaleString(undefined,{maximumFractionDigits:8});
                    if (stakeInfo) {
                        if (j.stake) {
                            const rew = j.stake.reward || 0;
                            stakeInfo.textContent = `${j.stake.principal} Aether @ ${Number(j.stake.apy*100).toFixed(1).replace('.0','')}% — Récompense: ${rew.toFixed(6)} Aether`;
                        } else stakeInfo.textContent = 'Aucun';
                    }
                }).catch(()=>{});
                const nftsEl = document.getElementById('wallet-nfts');
                const nftsHistEl = document.getElementById('wallet-nfts-history');
                fetch(`${API_BASE}/api/wallet/nfts`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r=>r.json()).then(j=>{
                    const n = (j.nfts||[]);
                    if (nftsEl) {
                        if (!n.length || !n[0] || !n[0].count) {
                            nftsEl.innerHTML = `<div style="color:#9ca3af;">${t('wallet.nfts.none')}</div>`;
                        } else {
                            const count = n[0].count;
                            const bonusLabel = (n[0].bonus && n[0].bonus.label) ? n[0].bonus.label : '+30% sur le minage auto';
                            const svg = `<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="24" cy="24" r="22" stroke="#22c55e" stroke-width="2"/>
  <circle cx="24" cy="24" r="6" fill="#22c55e"/>
  <line x1="24" y1="2" x2="24" y2="12" stroke="#22c55e" stroke-width="2"/>
  <line x1="24" y1="36" x2="24" y2="46" stroke="#22c55e" stroke-width="2"/>
  <line x1="2" y1="24" x2="12" y2="24" stroke="#22c55e" stroke-width="2"/>
  <line x1="36" y1="24" x2="46" y2="24" stroke="#22c55e" stroke-width="2"/>
</svg>`;
                            nftsEl.innerHTML = `
                                <div class="detail-grid">
                                  <div style="display:flex;align-items:center;gap:12px;">
                                    <div>${svg}</div>
                                    <div>
                                      <strong>${t('wallet.nfts.node')}</strong>
                                      <div style="font-size:1.25em;margin-top:2px;">${count}</div>
                                      <div style="font-size:0.85em;color:#9ca3af;margin-top:4px;">${bonusLabel}</div>
                                    </div>
                                  </div>
                                </div>`;
                        }
                    }
                    if (nftsHistEl) {
                        const rows = (j.history||[]).map(ev => {
                            return `<tr><td>${new Date(ev.created_at).toLocaleString()}</td><td>${t('wallet.event.nft_node')}</td><td>${ev.amount}</td></tr>`;
                        }).join('');
                        nftsHistEl.innerHTML = rows ? `
                            <table class="data-table">
                                <thead><tr><th>Date</th><th>Évènement</th><th>Quantité</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>` : '';
                    }
                }).catch(()=>{});
                const histEl = document.getElementById('wallet-history');
                if (histEl) {
                    fetch(`${API_BASE}/api/wallet/history`, { headers: { 'Authorization': `Bearer ${token}` }})
                    .then(r=>r.json()).then(j=>{
                        const rows = (j.events||[]).map(ev=>{
                            let label = ev.type;
                            if (ev.type==='stake_start') label = t('wallet.event.stake_start');
                            if (ev.type==='stake_end') label = t('wallet.event.stake_end');
                            if (ev.type==='withdraw') label = t('wallet.event.withdraw');
                            if (ev.type==='credit') label = t('wallet.event.credit');
                            if (ev.type==='nft_node') label = t('wallet.event.nft_node');
                            return `<tr><td>${new Date(ev.created_at).toLocaleString()}</td><td>${label}</td><td>${ev.amount}</td></tr>`;
                        }).join('');
                        histEl.innerHTML = `
                            <table class="data-table">
                                <thead><tr><th>Date</th><th>Évènement</th><th>Montant</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                        `;
                    }).catch(()=>{});
                }
            }
            if (stakeBtn) stakeBtn.addEventListener('click', () => {
                const amount = parseFloat(stakeAmt.value||'0');
                fetch(`${API_BASE}/api/wallet/stake`, { method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` }, body: JSON.stringify({ amount })})
                .then(r=>r.json()).then(j=>{
                    if (j && j.error) {
                        if (j.error === 'insufficient_balance') alert('Solde insuffisant pour staker ce montant.');
                        else alert('Erreur de staking: ' + j.error);
                    }
                    refresh();
                }).catch(()=>alert('Erreur réseau staking'));
            });
            if (unstakeBtn) unstakeBtn.addEventListener('click', () => {
                fetch(`${API_BASE}/api/wallet/unstake`, { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }})
                .then(r=>r.json()).then(j=>{
                    if (j && j.error) alert('Erreur unstake: ' + j.error);
                    refresh();
                }).catch(()=>alert('Erreur réseau unstake'));
            });
            if (withdrawBtn) withdrawBtn.addEventListener('click', () => {
                const amount = parseFloat(withdrawAmt.value||'0');
                fetch(`${API_BASE}/api/wallet/withdraw`, { method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` }, body: JSON.stringify({ amount })})
                .then(r=>r.json()).then(j=>{
                    if (j.error) alert(j.error);
                    refresh();
                });
            });
            refresh();
            if (window.walletRefreshInterval) { try { clearInterval(window.walletRefreshInterval); } catch {} }
            window.walletRefreshInterval = setInterval(refresh, 5000);
        }
        function getAdminAirdropHTML() {
            return `
                <div class="page-content">

                            <input id="airdrop-campaign-id" type="text" placeholder="ID campagne (ex: v1)" style="padding:8px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#fff;min-width:160px">

                    <!-- Bonus Panel Modal -->
                    <div class="modal" id="bonus-panel-modal">
                        <div class="modal-content glass-card neon-border-purple" style="max-width: 500px;">
                            <h2 class="neon-text-purple" style="margin-bottom: 20px; text-align: center;">Configuration du Bonus</h2>
                            <div class="form-grid" style="grid-template-columns: 1fr;">
                                <div class="profile-field">
                                    <label>Jours actifs minimum (ancienneté)</label>
                                    <input type="number" id="bonus-active-days" placeholder="Ex: 10" min="0">
                                    <div style="font-size:0.75rem;color:#94a3b8;">Cible les utilisateurs inscrits depuis au moins X jours.</div>
                                </div>

                                    <label>Nombre de nouveaux utilisateurs éligibles</label>
                                    <input type="number" id="bonus-max-users" placeholder="Ex: 50" min="0">

                                    <label>Type de récompense</label>
                                    <select id="bonus-reward-type">
                                        <option value="points">Points Dashboard</option>

                                        <option value="Bronze">Bronze</option>

        function initializeAdminAirdropPage() {
            const token = localStorage.getItem('token');
            const tbody = document.querySelector('#airdrop-table tbody');
            const searchInput = document.getElementById('airdrop-search');
            const statsDiv = document.getElementById('airdrop-stats');
            const btnCalc = document.getElementById('btn-calc-airdrop');
            const inputCampaign = document.getElementById('airdrop-campaign-id');
            const btnAward = document.getElementById('btn-award-airdrop');
            const btnWithdraw = document.getElementById('btn-toggle-withdraw');
            const inputSupply = document.getElementById('airdrop-circulating-supply');
            const btnSaveSupply = document.getElementById('btn-save-airdrop-supply');
            const supplyHint = document.getElementById('airdrop-supply-hint');
            
            let currentSort = 'score';
            let currentOrder = 'desc';
            let participantsData = [];
            let currentCirculatingSupply = 500000000;

            const bonusModal = document.getElementById('bonus-panel-modal');
            const btnOpenBonus = document.getElementById('btn-open-bonus-panel');
            const btnApplyBonus = document.getElementById('btn-apply-bonus');
            const rewardTypeSelect = document.getElementById('bonus-reward-type');
            const valueContainer = document.getElementById('bonus-value-container');
            const rankContainer = document.getElementById('bonus-rank-container');
            const valueLabel = document.getElementById('bonus-value-label');

            if (btnOpenBonus) {
                btnOpenBonus.addEventListener('click', () => {
                    bonusModal.classList.add('open');
                });
            }

            if (rewardTypeSelect) {
                rewardTypeSelect.addEventListener('change', () => {
                    const type = rewardTypeSelect.value;
                    if (type === 'rank') {
                        valueContainer.style.display = 'none';
                        rankContainer.style.display = 'block';
                    } else {
                        valueContainer.style.display = 'block';
                        rankContainer.style.display = 'none';
                        valueLabel.textContent = type === 'aether' ? 'Quantité d\'Aether à ajouter' : 'Points à ajouter';
                    }
                });
            }

            if (btnApplyBonus) {
                btnApplyBonus.addEventListener('click', async () => {
                    const activeDays = document.getElementById('bonus-active-days').value;
                    const maxUsers = document.getElementById('bonus-max-users').value;
                    const rewardType = rewardTypeSelect.value;
                    const rewardValue = rewardType === 'rank' ? document.getElementById('bonus-reward-rank').value : document.getElementById('bonus-reward-value').value;

                    if (!rewardValue) { alert('Veuillez entrer une valeur'); return; }
                    if (!confirm(`Voulez-vous vraiment appliquer ce bonus à tous les utilisateurs correspondants ?`)) return;

                    btnApplyBonus.disabled = true;
                    btnApplyBonus.textContent = 'Application...';

                    try {
                        const res = await fetch(`${API_BASE}/api/admin/bonus/apply`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}` 
                            },
                            body: JSON.stringify({
                                activeDays: activeDays ? parseInt(activeDays) : 0,
                                maxNewUsers: maxUsers ? parseInt(maxUsers) : 0,
                                rewardType,
                                rewardValue: (rewardType === 'rank' ? rewardValue : parseFloat(rewardValue))
                            })
                        });
                        const j = await res.json();
                        if (res.ok) {
                            alert(j.message || 'Bonus appliqué !');
                            bonusModal.classList.remove('open');
                            loadParticipants();
                        } else {
                            alert('Erreur: ' + (j.error || 'Inconnue'));
                        }
                    } catch (e) {
                        alert('Erreur réseau');
                    } finally {
                        btnApplyBonus.disabled = false;
                        btnApplyBonus.textContent = 'Appliquer le Bonus';
                    }
                });
            }

            // 1. Fetch Withdrawal Status
            fetch(`${API_BASE}/api/admin/settings/withdrawals`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r => r.json())
                .then(data => {
                    const enabled = data.enabled === true;
                    updateWithdrawButton(enabled);
                })
                .catch(err => {
                    console.error(err);
                    btnWithdraw.textContent = 'Erreur statut';
                });

            function formatInt(n) {
                const v = Number(n);
                if (!Number.isFinite(v)) return String(n);
                try { return Math.round(v).toLocaleString('fr-FR'); } catch { return String(Math.round(v)); }
            }

            async function loadAirdropSupply() {
                if (!inputSupply || !btnSaveSupply || !supplyHint) return;
                supplyHint.textContent = 'Chargement...';
                try {
                    const res = await fetch(`${API_BASE}/api/admin/settings/airdrop-supply`, { headers: { 'Authorization': `Bearer ${token}` }});
                    const j = await res.json().catch(()=>({}));
                    if (!res.ok) throw new Error(j.error || `Erreur ${res.status}`);
                    const v = Number(j.circulating_supply);
                    if (Number.isFinite(v) && v > 0) {
                        currentCirculatingSupply = v;
                        inputSupply.value = String(Math.round(v));
                        supplyHint.textContent = `Actuel: ${formatInt(v)} tokens`;
                    } else {
                        currentCirculatingSupply = 500000000;
                        inputSupply.value = '';
                        supplyHint.textContent = `Non défini (défaut: ${formatInt(currentCirculatingSupply)} tokens)`;
                    }
                } catch (e) {
                    supplyHint.textContent = 'Erreur de chargement';
                }
            }

            async function saveAirdropSupplyIfNeeded(force = false) {
                if (!inputSupply || !btnSaveSupply || !supplyHint) return true;
                const v = Number(inputSupply.value);
                if (!Number.isFinite(v) || v <= 0) {
                    if (!force) return true;
                    alert('Veuillez entrer un nombre valide de tokens en circulation.');
                    return false;
                }
                if (!force && Number.isFinite(currentCirculatingSupply) && v === Math.round(currentCirculatingSupply)) return true;
                btnSaveSupply.disabled = true;
                btnSaveSupply.textContent = 'Enregistrement...';
                try {
                    const res = await fetch(`${API_BASE}/api/admin/settings/airdrop-supply`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ circulating_supply: v })
                    });
                    const j = await res.json().catch(()=>({}));
                    if (!res.ok) throw new Error(j.error || `Erreur ${res.status}`);
                    const saved = Number(j.circulating_supply);
                    if (Number.isFinite(saved) && saved > 0) currentCirculatingSupply = saved;
                    supplyHint.textContent = `Actuel: ${formatInt(currentCirculatingSupply)} tokens`;
                    return true;
                } catch (e) {
                    alert('Erreur: ' + (e.message || 'Inconnue'));
                    return false;
                } finally {
                    btnSaveSupply.disabled = false;
                    btnSaveSupply.textContent = 'Enregistrer';
                }
            }

            function updateWithdrawButton(enabled) {
                btnWithdraw.textContent = enabled ? '✅ Retraits Activés' : '⛔ Retraits Désactivés';
                btnWithdraw.className = enabled ? 'profile-btn' : 'profile-btn secondary'; 
                if (enabled) {
                    btnWithdraw.style.backgroundColor = '#22c55e'; // Green
                    btnWithdraw.title = 'Les retraits sont actuellement autorisés. Cliquez pour désactiver.';
                } else {
                    btnWithdraw.style.backgroundColor = ''; 
                    btnWithdraw.title = 'Les retraits sont bloqués. Cliquez pour activer.';
                }
                btnWithdraw.disabled = false;
                btnWithdraw.dataset.enabled = enabled;
            }

            // 2. Fetch Participants
            function loadParticipants() {
                const search = searchInput.value;
                const url = `${API_BASE}/api/admin/airdrop/participants?sort_by=${currentSort}&order=${currentOrder}&search=${encodeURIComponent(search)}`;
                
                fetch(url, { headers: { 'Authorization': `Bearer ${token}` }})
                    .then(r => r.json())
                    .then(data => {
                        participantsData = data.participants || [];
                        renderTable(participantsData);
                    })
                    .catch(err => {
                        console.error(err);
                        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#ef4444">Erreur de chargement</td></tr>`;
                    });
            }

            function renderTable(data) {
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#9ca3af">Aucun participant trouvé</td></tr>`;
                    statsDiv.textContent = '0 participants';
                    return;
                }

                let totalAlloc = 0;
                const rows = data.map(u => {
                    totalAlloc += parseFloat(u.airdrop_allocation || 0);
                    const lastCalc = u.last_airdrop_calculation ? new Date(u.last_airdrop_calculation).toLocaleString() : '-';
                    return `
                        <tr>
                            <td>${u.id}</td>
                            <td>
                                <div>${maskUsername(u.username || 'Inconnu')}</div>
                                <div style="font-size:0.8em;color:#94a3b8">${maskEmail(u.email)}</div>
                            </td>
                            <td style="font-weight:bold;color:#fbbf24">${parseFloat(u.airdrop_score || 0).toFixed(2)}</td>
                            <td style="font-weight:bold;color:#22c55e">${parseFloat(u.airdrop_allocation || 0).toLocaleString()}</td>
                            <td>${parseFloat(u.total_spent || 0).toFixed(2)} €</td>
                            <td>${parseInt(u.total_points || 0).toLocaleString()}</td>
                            <td>${u.active_days}j</td>
                            <td style="font-weight:bold;color:#86efac">${parseFloat(u.balance_ath || 0).toLocaleString(undefined, {maximumFractionDigits: 8})} ATH</td>
                            <td style="font-size:0.85em;color:#94a3b8">${lastCalc}</td>
                        </tr>
                    `;
                }).join('');
                
                tbody.innerHTML = rows;
                const supplyLabel = currentCirculatingSupply ? formatInt(currentCirculatingSupply) : '—';
                statsDiv.innerHTML = `${data.length} participants &bull; Total Alloc: ${totalAlloc.toLocaleString()} Tokens &bull; Supply: ${supplyLabel}`;
            }

            function maskEmail(email) {
                if (!email) return '';
                const [name, domain] = email.split('@');
                if (!domain) return email;
                return `${name.substring(0, 2)}***@${domain}`;
            }

            // Events
            searchInput.addEventListener('input', () => {
                // Debounce simple
                if (window.airdropSearchTimeout) clearTimeout(window.airdropSearchTimeout);
                window.airdropSearchTimeout = setTimeout(loadParticipants, 500);
            });

            document.querySelectorAll('#airdrop-table th[data-sort]').forEach(th => {
                th.addEventListener('click', () => {
                    const sort = th.dataset.sort;
                    if (currentSort === sort) {
                        currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSort = sort;
                        currentOrder = 'desc';
                    }
                    loadParticipants();
                });
            });

            (function presetCampaignId(){
                try {
                    const d = new Date();
                    const id = `v${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
                    if (inputCampaign && !inputCampaign.value) inputCampaign.value = id;
                } catch {}
            })();

            btnCalc.addEventListener('click', async () => {
                const previewSupply = (inputSupply && Number(inputSupply.value) > 0) ? Number(inputSupply.value) : currentCirculatingSupply;
                const supplyTxt = formatInt(previewSupply);
                if (!confirm(`Êtes-vous sûr de vouloir recalculer l'allocation airdrop pour TOUS les utilisateurs ? Cette opération peut prendre du temps.\nSupply utilisée: ${supplyTxt} tokens`)) return;
                
                btnCalc.disabled = true;
                btnCalc.textContent = 'Calcul en cours...';
                
                try {
                    const okSave = await saveAirdropSupplyIfNeeded(false);
                    if (!okSave) { btnCalc.disabled = false; btnCalc.textContent = 'Calculer Allocation Airdrop'; return; }
                    const res = await fetch(`${API_BASE}/api/admin/airdrop/calculate`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ circulating_supply: previewSupply })
                    });
                    let j = null;
                    let raw = '';
                    try { j = await res.json(); } catch { try { raw = await res.text(); } catch {} }
                    
                    if (res.ok) {
                        const msg = (j && j.message) ? j.message : 'Calcul terminé';
                        const total = (j && typeof j.total_global_score === 'number') ? j.total_global_score : null;

                        alert(total !== null ? `Succès ! ${msg}\nScore Global: ${total.toFixed(2)}\nSupply: ${formatInt(currentCirculatingSupply)} tokens` : `Succès ! ${msg}\nSupply: ${formatInt(currentCirculatingSupply)} tokens`);
                        loadParticipants();
                    } else {
                        const code = res.status;
                        const errMsg = (j && j.error) ? j.error : (raw || 'Inconnue');
                        if (code === 401 || code === 403) {
                            alert('Accès non autorisé. Veuillez vous reconnecter avec un compte administrateur.');

                            alert("Aucun utilisateur éligible ou données insuffisantes pour le calcul.\nAssurez‑vous qu’il existe des points, des dépenses ou des achats, puis réessayez.");
                        } else {
                            alert(`Erreur (${code}) : ${errMsg}`);

        /* --- Support System Logic (Unified) --- */

        // --- User Functions ---

        function loadUserTickets() {
            const container = document.getElementById('support-view-container');
            if(!container) return;
            
            fetch(`${API_BASE}/api/support/tickets`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(r => r.json())
            .then(data => {
                const tickets = Array.isArray(data) ? data : (data && data.tickets) ? data.tickets : [];
                if (!tickets || tickets.length === 0) {
                    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;">${t('support.no_tickets')}</div>`;
                    return;
                }
                
                let html = `<div class="support-list">`;
                tickets.forEach(t => {
                    let statusClass = 'status-closed';
                    if (t.status === 'open') statusClass = 'status-open';
                    else if ((t.status||'').toLowerCase().includes('pending')) statusClass = 'status-pending';
                    const date = new Date(t.updated_at).toLocaleString();
                    const subject = (t.subject||'').replace(/'/g, "\\'");
                    const hasUnread = String(t.status || '').toLowerCase() === 'pending_user';
                    
                    html += `
                        <div class="ticket-item" onclick="openUserTicket('${t.id}', '${subject}')">
                            <div>
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                    ${hasUnread ? `<span style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;flex:0 0 auto;"></span>` : ''}
                                    <div style="font-weight:600;">${t.subject}</div>
                                </div>

                            </div>
                            <div class="ticket-status ${statusClass}">${t.status}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;
            })
            .catch(err => {
                console.error(err);
                container.innerHTML = `<div style="padding:16px;color:#ef4444;">Erreur de chargement.</div>`;
            });
        }

        function createTicket(subject) {
            const fd = new FormData();
            fd.append('subject', subject);
            fd.append('message', subject);
            fd.append('priority', 'medium');
            fetch(`${API_BASE}/api/support/tickets`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: fd
            })
            .then(r => r.json())
            .then(ticket => {
                if (ticket && ticket.id) openUserTicket(ticket.id, subject);
                else alert('Erreur création ticket');
            })
            .catch(() => alert('Erreur création ticket'));
        }

                                     <label for="chat-file-input" class="profile-btn" style="padding:8px;cursor:pointer;">📷</label>

        // --- Shared Chat Functions ---

        function setupChatListeners(ticketId) {
            const fileInput = document.getElementById('chat-file-input');
            if (fileInput) {
                fileInput.onchange = () => {
                    if (fileInput.files.length > 0) sendSupportMessage(fileInput.files[0]);
                };
            }

            const textInput = document.getElementById('chat-input-text');
            if (textInput) {
                textInput.onkeypress = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendSupportMessage();
                    }
                };
            }

            loadMessages(ticketId);
            if (supportPollInterval) clearInterval(supportPollInterval);
            supportPollInterval = setInterval(() => loadMessages(ticketId), 3000);
        }

        function loadMessages(ticketId) {
            if (currentSupportTicketId != ticketId) return; // Note: loose equality for string/int match
            
            fetch(`${API_BASE}/api/support/tickets/${ticketId}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(r => r.json())
            .then(data => {
                const area = document.getElementById('chat-messages-area');
                if (!area) return;
                
                const isAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 100;
                
                area.innerHTML = (data.messages || []).map(m => {
                    const myId = window.currentUserId; // Need to ensure this is set globally or fetch from token
                    // Alternative: Check sender_role vs current user role, but simpler to check ID if available.
                    // If window.currentUserId is not set, we might have display issues.
                    // Fallback: If I am 'admin' and sender_role is 'admin', it's me.
                    // But if I am 'user' and sender_role is 'user', it's me.
                    // Better: Decoded token payload usually has ID.
                    
                    let isMe = false;
                    try {
                        const payload = JSON.parse(atob(localStorage.getItem('token').split('.')[1]));
                        if(payload.userId == m.sender_id) isMe = true;
                    } catch(e) {}

                    const role = String(m.sender_role || '').toLowerCase();
                    const label = isMe ? (t('common.you') || 'Vous') : (role === 'admin' ? 'Support' : (m.username || 'User'));
                    const time = m.created_at ? new Date(m.created_at).toLocaleString() : '';

                    let content = `<div style="white-space:pre-wrap;">${m.message || ''}</div>`;
                    if (m.attachment_url || m.image_url) {
                        const rawUrl = m.attachment_url || m.image_url;
                        const fullUrl = rawUrl.startsWith('http') ? rawUrl : `${API_BASE}${rawUrl}`;
                        content += `<img data-src="${fullUrl}" class="message-image" style="max-width:320px;border-radius:6px;cursor:pointer;display:block;margin-top:6px;" />`;
                    }
                    
                    return `<div class="message ${isMe ? 'message-user' : 'message-admin'}">
                        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px;">
                            <div style="font-size:0.75rem;opacity:0.85;font-weight:600;">${label}</div>
                            <div style="font-size:0.7rem;opacity:0.6;white-space:nowrap;">${time}</div>
                        </div>
                        ${content}
                    </div>`;
                }).join('');

                // Post-process images to support auth-protected URLs
                const imgs = area.querySelectorAll('img.message-image[data-src]');
                imgs.forEach(async (img) => {
                    const url = img.getAttribute('data-src');
                    try {
                        const r = await fetch(url, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }});
                        if (r.ok && r.headers.get('content-type') && r.headers.get('content-type').startsWith('image/')) {
                            const blob = await r.blob();
                            const blobUrl = URL.createObjectURL(blob);
                            img.src = blobUrl;
                            img.onclick = () => window.open(url, '_blank');
                        } else {
                            img.src = url;
                            img.onclick = () => window.open(url, '_blank');
                        }
                    } catch {
                        img.src = url;
                        img.onclick = () => window.open(url, '_blank');
                    }
                });

                if (isAtBottom) area.scrollTop = area.scrollHeight;
            })
            .catch(err => console.error(err));
        }

        function sendSupportMessage(file = null) {
            const textInput = document.getElementById('chat-input-text');
            const message = textInput ? textInput.value.trim() : '';
            
            if (!message && !file) return;

            const formData = new FormData();
            if (message) formData.append('message', message);
            if (file) formData.append('image', file);

            fetch(`${API_BASE}/api/support/tickets/${currentSupportTicketId}/messages`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: formData
            })
            .then(r => r.json())
            .then(() => {
                if (textInput) textInput.value = '';
                if (document.getElementById('chat-file-input')) document.getElementById('chat-file-input').value = '';
                loadMessages(currentSupportTicketId);
            })
            .catch(err => alert('Erreur envoi message'));
        }

        function closeTicket(id) {
            if (!confirm('Voulez-vous vraiment fermer ce ticket ?')) return;
            
            fetch(`${API_BASE}/api/support/tickets/${id}/close`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(r => r.json())
            .then(() => {
                // If we are in Admin view
                const adminList = document.getElementById('admin-ticket-list');
                if(adminList) {
                    loadAdminTickets();
                    openAdminTicket(id);
                } else {
                    // User view
