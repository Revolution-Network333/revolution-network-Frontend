    <script>
        const API_BASE = 'https://revolution-backend-sal2.onrender.com';
        
        // Check for referral code in URL
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            localStorage.setItem('referralCode', refCode);
        }
        if (location.pathname === '/register') {
            const qs = location.search || '';
            history.replaceState(null, '', `/${qs}`);
        }

        // State
        let currentPage = localStorage.getItem('token') ? 'overview' : 'login';
        let currentUsername = null;

        // Navigation
        function setPage(page) {
            console.log('Navigating to:', page);
            // Clear intervals from previous pages
            if (overviewInterval) {
                clearInterval(overviewInterval);
                overviewInterval = null;
            }
            if (nodesInterval) {
                clearInterval(nodesInterval);
                nodesInterval = null;
            }
            if (rewardsInterval) {
                clearInterval(rewardsInterval);
                rewardsInterval = null;
            }

            const token = localStorage.getItem('token');
            currentPage = (!token && page !== 'login') ? 'login' : page;
            
            // Mettre à jour les classes active
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                const onclick = item.getAttribute('onclick');
                if (onclick && onclick.includes(`'${page}'`)) {
                    item.classList.add('active');
                }
            });
            
            try {
                renderPage();
            } catch (e) {
                console.error('Error rendering page:', e);
            }

            if (window.innerWidth <= 768) {
                toggleMobileMenu();
            }
        }

        // Expose setPage to window
        window.setPage = setPage;

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        }

        // Mobile menu
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Header refresh from profile
        function refreshHeader() {
            const token = localStorage.getItem('token');
            const accountStatus = document.querySelector('.account-status');
            const totalPoints = document.querySelector('.total-points');
            const headerLogoutBtn = document.getElementById('header-logout-btn');
            const userAvatar = document.querySelector('.user-avatar');

            if (!token) {
                if (accountStatus) accountStatus.style.display = 'none';
                if (totalPoints) totalPoints.style.display = 'none';
                if (headerLogoutBtn) headerLogoutBtn.style.display = 'none';
                if (userAvatar) userAvatar.style.display = 'none';
                const headerLoginBtn = document.getElementById('header-login-btn');
                if (headerLoginBtn) headerLoginBtn.style.display = 'inline-flex';
                return;
            }

            fetch(`${API_BASE}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(async res => {
                if (res.status === 401) {
                    const rt = localStorage.getItem('refreshToken');
                    if (rt) {
                        const rf = await fetch(`${API_BASE}/api/auth/refresh`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refreshToken: rt })
                        });
                        if (rf.ok) {
                            const j = await rf.json();
                            if (j.token) {
                                localStorage.setItem('token', j.token);
                                return fetch(`${API_BASE}/api/user/profile`, {
                                    headers: { 'Authorization': `Bearer ${j.token}` }
                                });
                            }
                        }
                    }
                    throw new Error('Token invalide');
                }
                return res.json();
            })
            .then(data => {
                if (data.user) {
                    currentUsername = data.user.username || null;
                    const tp = document.getElementById('header-total-points');
                    if (tp) tp.textContent = `Total: ${data.user.total_points} pt`;
                    const referralsBadge = document.getElementById('header-referrals');
                    if (referralsBadge) referralsBadge.textContent = `Parrainés: ${data.user.total_referrals || 0}`;

                    if (userAvatar) {
                        userAvatar.style.display = 'flex';
                        console.log('Profile Picture URL:', data.user.profile_picture_url); // Debug
                        if (data.user.profile_picture_url) {
                            // Ensure the URL is absolute if it starts with /public
                            const bgUrl = `${API_BASE}${data.user.profile_picture_url}?t=${Date.now()}`;
                            userAvatar.style.backgroundImage = `url('${bgUrl}')`;
                            userAvatar.textContent = '';
                        } else if (data.user.username) {
                            userAvatar.textContent = data.user.username.charAt(0).toUpperCase();
                            userAvatar.style.backgroundImage = '';
                        }
                    }
                    const role = (data.user.role || 'user').toLowerCase();
                    const enterpriseBtn = document.getElementById('menu-enterprise-api');
                    const adminBtn = document.getElementById('menu-admin');
                    const adminShopBtn = document.getElementById('menu-admin-shop');
                    const adminTasksBtn = document.getElementById('menu-admin-tasks');
                    if (enterpriseBtn) {
                        enterpriseBtn.style.display = (role === 'entreprise' || role === 'admin') ? 'flex' : 'none';
                    }
                    if (adminBtn) {
                        adminBtn.style.display = role === 'admin' ? 'flex' : 'none';
                    }
                    if (adminShopBtn) {
                        adminShopBtn.style.display = role === 'admin' ? 'flex' : 'none';
                    }
                    if (adminTasksBtn) {
                        adminTasksBtn.style.display = role === 'admin' ? 'flex' : 'none';
                    }
                    const headerLoginBtn = document.getElementById('header-login-btn');
                    if (headerLoginBtn) headerLoginBtn.style.display = 'none';
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                const headerLoginBtn = document.getElementById('header-login-btn');
                const accountStatus = document.querySelector('.account-status');
                const totalPoints = document.querySelector('.total-points');
                const headerLogoutBtn = document.getElementById('header-logout-btn');
                const userAvatar = document.querySelector('.user-avatar');
                if (accountStatus) accountStatus.style.display = 'none';
                if (totalPoints) totalPoints.style.display = 'none';
                if (headerLogoutBtn) headerLogoutBtn.style.display = 'none';
                if (userAvatar) userAvatar.style.display = 'none';
                if (headerLoginBtn) headerLoginBtn.style.display = 'inline-flex';
            });
        }

        function maskUsername(name) {
            if (!name) return '';
            if (currentUsername && name === currentUsername) return name;
            const n = name.length;
            const half = Math.ceil(n / 2);
            return name.slice(0, half) + '*'.repeat(n - half);
        }

        // Render pages
        function renderPage() {
            const content = document.getElementById('pageContent');

            switch(currentPage) {
                case 'login':
                    content.innerHTML = getLoginHTML();
                    initializeLoginPage();
                    break;
                case 'overview':
                    content.innerHTML = getOverviewHTML();
                    initializeOverviewPage();
                    break;
                case 'nodes':
                    content.innerHTML = getNodesHTML();
                    initializeNodesPage();
                    break;
                case 'rewards':
                    content.innerHTML = getRewardsHTML();
                    initializeRewardsPage();
                    break;
                case 'referrals':
                    content.innerHTML = getReferralsHTML();
                    initializeReferralsPage();
                    break;
                case 'profile':
                    content.innerHTML = getProfileHTML();
                    initializeProfilePage();
                    break;
                case 'shop':
                    content.innerHTML = getShopHTML();
                    initializeShopPage();
                    break;
                case 'download':
                    content.innerHTML = getDownloadHTML();
                    initializeDownloadPage();
                    break;
                case 'enterpriseApi':
                    content.innerHTML = getEnterpriseApiHTML();
                    initializeEnterpriseApiPage();
                    break;
                case 'tasks':
                    content.innerHTML = getTasksHTML();
                    initializeTasksPage();
                    break;
                case 'wallet':
                    content.innerHTML = getWalletHTML();
                    initializeWalletPage();
                    break;
                case 'leaderboard':
                    content.innerHTML = getLeaderboardHTML();
                    initializeLeaderboardPage();
                    break;
                case 'adminLeaderboard':
                    content.innerHTML = getAdminLeaderboardHTML();
                    initializeAdminLeaderboardPage();
                    break;
                case 'adminShop':
                    content.innerHTML = getAdminShopHTML();
                    initializeAdminShopPage();
                    break;
                case 'adminTasks':
                    content.innerHTML = getAdminTasksHTML();
                    initializeAdminTasksPage();
                    break;
            }
        }

        function getLoginHTML() {
            return `
                <div class="page-content">
                    <div class="page-header">
                        <h1 class="page-title">Connexion</h1>
                    </div>
                    <div class="profile-card" style="max-width: 520px; margin: 0 auto;">
                        <form id="login-form">
                            <div class="profile-field">
                                <label for="login-email">Email ou nom de connexion</label>
                                <input type="text" id="login-email" required>
                            </div>
                            <div class="profile-field">
                                <label for="login-password">Mot de passe</label>
                                <input type="password" id="login-password" required>
                            </div>
                            <div class="profile-field">
                                <label for="login-referral">Code de parrainage (optionnel)</label>
                                <input type="text" id="login-referral">
                            </div>
                            <div class="profile-actions">
                                <button type="submit" class="profile-btn primary">Se connecter</button>
                                <button type="button" id="toggle-register" class="profile-btn">S’inscrire</button>
                                <button type="button" id="google-login-btn" class="profile-btn">Continuer avec Google</button>
                                <button type="button" id="phantom-login-btn" class="profile-btn">Continuer avec Phantom</button>
                            </div>
                        </form>
                        <form id="register-form" style="display:none; margin-top: 16px;">
                            <div class="profile-field">
                                <label for="register-username">Nom d'utilisateur</label>
                                <input type="text" id="register-username" required>
                            </div>
                            <div class="profile-field">
                                <label for="register-email">Email</label>
                                <input type="email" id="register-email" required>
                            </div>
                            <div class="profile-field">
                                <label for="register-password">Mot de passe (min 8)</label>
                                <input type="password" id="register-password" required>
                            </div>
                            <div class="profile-field">
                                <label for="register-referral">Code de parrainage (optionnel)</label>
                                <input type="text" id="register-referral">
                            </div>
                            <div class="profile-actions">
                                <button type="submit" class="profile-btn primary">Créer mon compte</button>
                                <button type="button" id="toggle-login" class="profile-btn">Retour à la connexion</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function initializeLoginPage() {
            const loginForm = document.getElementById('login-form');
            if (!loginForm) return;

            const emailInput = document.getElementById('login-email');
            const passInput = document.getElementById('login-password');
            const googleBtn = document.getElementById('google-login-btn');
            const phantomBtn = document.getElementById('phantom-login-btn');
            
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                console.log('Login attempt...');
                fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: emailInput.value, 
                        password: passInput.value,
                        referralCode: document.getElementById('login-referral')?.value || localStorage.getItem('referralCode') || null
                    })
                })
                .then(async res => {
                    try {
                        const data = await res.json();
                        return { ok: res.ok, data };
                    } catch {
                        const text = await res.text();
                        return { ok: res.ok, data: { error: text || 'Erreur serveur' } };
                    }
                })
                .then(({ ok, data }) => {
                    if (ok && data.token) {
                        localStorage.setItem('token', data.token);
                        if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                        currentPage = 'overview';
                        renderPage();
                        refreshHeader();
                        const lm = document.getElementById('login-modal');
                        if (lm) lm.classList.remove('open');
                    } else {
                        alert('Connexion échouée: ' + (data.error || 'Erreur inconnue'));
                    }
                })
                .catch(err => {
                    console.error('Login error:', err);
                    alert('Erreur de connexion au serveur');
                });
            });

            if (googleBtn) {
                googleBtn.addEventListener('click', () => {
                    const referralCode = localStorage.getItem('referralCode');
                    const deviceId = localStorage.getItem('googleGuestId') || (localStorage.setItem('googleGuestId', Math.random().toString(36).slice(2)), localStorage.getItem('googleGuestId'));
                    try { window.open('https://accounts.google.com/AccountChooser?continue=https://www.google.com', '_blank'); } catch {}
                    fetch(`${API_BASE}/api/auth/google-login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: null, referralCode, deviceId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                            currentPage = 'overview';
                            renderPage();
                            refreshHeader();
                        } else {
                            alert(data.error || 'Connexion Google impossible');
                        }
                    })

            if (toggleLogin && registerForm && loginForm) {

                        } else {
                            alert(data.error || 'Inscription impossible');

                    })
                    .catch(() => alert('Erreur de connexion au serveur'))
                });

        function initializeProfilePage() {
            const token = localStorage.getItem('token');
            if (!token) return;

            const profileForm = document.getElementById('profile-form');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const solanaInput = document.getElementById('solana_address');
            const logoutBtn = document.getElementById('logout-btn');
            const setPasswordBtn = document.getElementById('set-password-btn');
            const newPasswordInput = document.getElementById('new-password');
            const confirmPasswordInput = document.getElementById('confirm-password');

            // Charger les données du profil
            fetch(`${API_BASE}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.user) {
                    usernameInput.value = data.user.username;
                    emailInput.value = data.user.email;
                    solanaInput.value = data.user.solana_address || '';
                }
            });

            // Gérer la soumission du formulaire
            profileForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const payload = {
                    username: usernameInput.value,
                    solana_address: solanaInput.value
                };

                fetch(`${API_BASE}/api/user/profile`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('Profil mis à jour avec succès!');
                    } else {
                        alert('Erreur: ' + data.error);
                    }
                });
            });

            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('token');
                window.location.reload();
            });
            if (setPasswordBtn) {
                setPasswordBtn.addEventListener('click', () => {
                    const np = newPasswordInput.value.trim();
                    const cp = confirmPasswordInput.value.trim();
                    if (!np || np.length < 6 || np !== cp) {
                        alert('Vérifier le mot de passe (min 6 caractères et confirmation identique)');
                        return;
                    }
                    fetch(`${API_BASE}/api/auth/set-password`, {
                        method: 'POST',
                        headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ newPassword: np })
                    }).then(r=>r.json()).then(data=>{
                        if (data.success) {
                            alert('Mot de passe enregistré. Vous pouvez vous connecter dans l’extension.');
                            newPasswordInput.value=''; confirmPasswordInput.value='';
                        } else { alert('Erreur: ' + (data.error||'inconnue')); }
                    });
                });
            }
        }

        function initializeEnterpriseApiPage() {
            const token = localStorage.getItem('token');
            if (!token) return;
            fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${token}` }})
            .then(r => r.json())
            .then(data => {
                const k = document.getElementById('api-key-value');
                const c = document.getElementById('api-credits');
                if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                if (c && data.credits) c.textContent = `${data.credits.used} utilisés / ${data.credits.remaining} restants`;
                if (data.requireSubscription) {
                    const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                    const wrap = document.createElement('div');
                    wrap.innerHTML = modalHtml;
                    document.body.appendChild(wrap.firstElementChild);
                    const modal = document.getElementById('subscription-modal');
                    const closeBtn = document.getElementById('subscription-close');
                    if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                    document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const link = btn.getAttribute('data-link');
                            if (link) window.open(link, '_blank');
                        });
                    });
                    let poll = setInterval(() => {
                        fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${token}` }})
                        .then(r => r.json())
                        .then(d => {
                            if (!d.requireSubscription) {
                                clearInterval(poll);
                                const m = document.getElementById('subscription-modal');
                                if (m) m.remove();
                                initializeEnterpriseApiPage();
                            }
                        }).catch(()=>{});
                    }, 3000);
                }
            }).catch(() => {});
            const copyBtn = document.getElementById('copy-api-key');
            const regenBtn = document.getElementById('regen-api-key');
            if (copyBtn) copyBtn.addEventListener('click', () => {
                const originalText = copyBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    const data = await r.json();
                    if (data.fullKey) {
                        await navigator.clipboard.writeText(data.fullKey);
                        const k = document.getElementById('api-key-value');
                        if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                        copyBtn.textContent = 'Copié';
                        const prevBg = copyBtn.style.backgroundColor;
                        copyBtn.style.backgroundColor = '#22c55e';
                        setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                    } else {
                        throw new Error('No key returned');
                    }
                }).catch(() => {
                    const prevBg = copyBtn.style.backgroundColor;
                    copyBtn.textContent = 'Erreur';
                    copyBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
            if (regenBtn) regenBtn.addEventListener('click', () => {
                const originalText = regenBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    await r.json();
                    regenBtn.textContent = 'Régénéré';
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.style.backgroundColor = '#22c55e';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                    initializeEnterpriseApiPage();
                }).catch(() => {
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.textContent = 'Erreur';
                    regenBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
        }

        function getEnterpriseSubscriptionModalHTML(plans) {
            const planCards = (plans || []).map(p => {
                const priceLabel = (p.price == null) ? 'Sur devis' : `${p.price} ${p.currency}`;
                const points = p.pointsPerMonth ? `${p.pointsPerMonth} points / mois` : '';
                const name = p.name || 'Plan';
                const recommended = /pro/i.test(name) ? ' (recommandé)' : '';
                const btnLabel = (p.price == null) ? 'Demander un devis' : 'S’abonner';
                const features = (() => {
                    if (/basic|standard/i.test(name)) return ['Accès API', 'Dashboard entreprise', 'Support standard'];
                    if (/pro/i.test(name)) return ['Priorité plus rapide', 'Accès jobs avancés', 'Support rapide'];
                    if (/business|entreprise/i.test(name)) return ['Priorité haute', 'Meilleure vitesse d’exécution', 'Support VIP', 'Export rapports'];
                    return [];
                })();
                const link = p.paymentLink || '';
                return `
                    <div class="plan-card">
                        <div class="plan-name">${name}${recommended}</div>
                        <div class="plan-price">${priceLabel}</div>
                        ${points ? `<div class="plan-points">${points}</div>` : ''}
                        <ul class="plan-features">
                            ${features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        <button class="profile-btn primary" data-link="${link}">${btnLabel}</button>
                    </div>
                `;
            }).join('');
            return `
                <div id="subscription-modal" class="modal-overlay">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>Abonnements Entreprise (Système de Points)</h3>
                            <button id="subscription-close" class="profile-btn">Fermer</button>
                        </div>

                                ${planCards}

                                <h4>Achat de points supplémentaires (top-up)</h4>
                                <div class="topup-grid">
                                    <div class="topup-item">10€ = 15 000 points</div>
                                    <div class="topup-item">50€ = 90 000 points</div>
                                    <div class="topup-item">100€ = 200 000 points</div>

                                <ul class="points-examples">
                                    <li>Compression image : 10 points</li>
                                    <li>Conversion audio : 200 points / minute</li>
                                    <li>Encodage vidéo : 500 points / minute</li>
                                    <li>OCR / PDF : 300 points</li>
                                    <li>Data job : à partir de 1000 points</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

function openShopItemModal(itemId) {
    const item = currentShopItems.find(i => i.id === itemId);
    if (!item) return;

    const modal = document.getElementById('shop-item-modal');
    const title = document.getElementById('shop-modal-title');
    const details = document.getElementById('shop-modal-details');

    title.innerText = item.title || item.name;
    
    let actionButton = '';
    let extraControls = '';
    let meta = {};
    try { meta = JSON.parse(item.metadata || '{}'); } catch {}
    if (item.type === 'subscription') {
        actionButton = `<button class="profile-btn primary" onclick="closeShopItemModal(); openPlansModal();">S’abonner</button>`;
    } else if (item.type === 'presale') {
        extraControls = `
            <div class="profile-field">
                <label>Quantité</label>
                <input type="number" id="buy-qty" min="${meta.minQty||1}" value="${meta.minQty||1}">
            </div>`;
        actionButton = `<button class="profile-btn primary" id="buy-btn">Acheter</button>`;
    } else if (item.type === 'vpn') {
        actionButton = `<button class="profile-btn primary" id="buy-btn">Activer le VPN</button>`;
    } else if (item.type === 'auto_mining') {
        actionButton = `<button class="profile-btn primary" id="buy-btn">Activer l’Auto‑minage</button>`;
    } else {
        actionButton = `<button class="profile-btn primary" onclick="window.open('https://buy.stripe.com/test_shop_item_${item.id}', '_blank')">Acheter maintenant</button>`;
    }

    details.innerHTML = `
        <div class="shop-detail-type" style="text-transform: uppercase; font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">${item.type}</div>
        <div class="shop-detail-price" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem;">${item.price} ${item.currency || 'EUR'}</div>
        <div class="shop-detail-desc" style="color: #9ca3af; margin-bottom: 2rem; line-height: 1.6;">${item.description || 'Aucune description disponible.'}</div>
        ${extraControls}
        <div class="shop-detail-actions">
            ${actionButton}
        </div>
    `;
    const buyBtn = document.getElementById('buy-btn');
    if (buyBtn) {
        buyBtn.addEventListener('click', () => {
            const token = localStorage.getItem('token');
            if (!token) { alert('Veuillez vous connecter'); return; }
            let payload = {};
            const qtyEl = document.getElementById('buy-qty');
            if (qtyEl) payload.qty = parseInt(qtyEl.value || '1');
            fetch(`${API_BASE}/api/shop/buy/${item.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            }).then(async (r) => {
                const j = await r.json().catch(()=>({}));
                if (!r.ok || j.error) { alert(j.error || 'Achat impossible'); return; }
                alert('Achat confirmé');
                closeShopItemModal();
            }).catch(() => alert('Erreur réseau'));
        });
    }

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

        function initializeAdminShopPage() {
            const token = localStorage.getItem('token');
            const tbody = document.querySelector('#admin-shop-table tbody');
            async function apiFetchAuth(url, options = {}) {
                const t = localStorage.getItem('token');
                const rt = localStorage.getItem('refreshToken');
                const opts = { ...options, headers: { ...(options.headers || {}), 'Authorization': `Bearer ${t}` } };
                let res = await fetch(url, opts);
                if ((res.status === 401 || res.status === 403) && rt) {
                    const rf = await fetch(`${API_BASE}/api/auth/refresh`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refreshToken: rt })
                    });
                    if (rf.ok) {
                        const j = await rf.json();
                        if (j.token) {
                            localStorage.setItem('token', j.token);
                            const opts2 = { ...options, headers: { ...(options.headers || {}), 'Authorization': `Bearer ${j.token}` } };
                            res = await fetch(url, opts2);
                        }
                    }
                }
                return res;
            }
            function load() {
                apiFetchAuth(`${API_BASE}/api/admin/shop/items`)
                    .then(r => r.json())
                    .then(data => {
                        const items = data.items || [];
                        tbody.innerHTML = items.map(i => `
                            <tr data-id="${i.id}">
                                <td contenteditable="true" data-field="title">${i.title || ''}</td>
                                <td>
                                    <select data-field="type" value="${i.type || 'subscription'}">
                                        <option value="subscription" ${i.type==='subscription'?'selected':''}>Abonnement</option>
                                        <option value="presale" ${i.type==='presale'?'selected':''}>Prévente Crypto</option>
                                        <option value="nft" ${i.type==='nft'?'selected':''}>NFT</option>
                                        <option value="merch" ${i.type==='merch'?'selected':''}>Merch</option>
                                    </select>
                                </td>
                                <td contenteditable="true" data-field="price">${i.price || 0}</td>
                                <td contenteditable="true" data-field="currency">${i.currency || 'EUR'}</td>
                                <td>
                                    <select data-field="active">
                                        <option value="1" ${i.active ? 'selected' : ''}>Oui</option>
                                        <option value="0" ${!i.active ? 'selected' : ''}>Non</option>
                                    </select>
                                </td>
                                <td contenteditable="true" data-field="description">${i.description || ''}</td>
                                <td data-field="metadata" style="display:none;">${i.metadata || ''}</td>
                                <td>
                                    <button class="profile-btn" data-action="edit">Éditer</button>
                                    <button class="profile-btn danger" data-action="delete">Supprimer</button>
                                </td>
                            </tr>
                        `).join('');
                        attachInlineHandlers();
                        attachRowActions();
                    }).catch(() => { tbody.innerHTML = ''; });
            }
            function attachInlineHandlers() {
                tbody.querySelectorAll('[contenteditable][data-field]').forEach(cell => {
                    cell.addEventListener('blur', () => {
                        const tr = cell.closest('tr');
                        const id = tr.getAttribute('data-id');
                        const field = cell.getAttribute('data-field');
                        let value = cell.textContent.trim();
                        if (field === 'price') value = parseFloat(value) || 0;
                        updateItemPartial(id, { [field]: value });
                    });
                });
                tbody.querySelectorAll('select[data-field]').forEach(sel => {
                    sel.addEventListener('change', () => {
                        const tr = sel.closest('tr');
                        const id = tr.getAttribute('data-id');
                        const field = sel.getAttribute('data-field');
                        const value = sel.value;
                        updateItemPartial(id, { [field]: field === 'active' ? (value==='1') : value });
                    });
                });
            }
            function attachRowActions() {
                tbody.querySelectorAll('button[data-action="edit"]').forEach(btn => {
                    btn.addEventListener('click', () => openEditModal(btn.closest('tr')));
                });
                tbody.querySelectorAll('button[data-action="delete"]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tr = btn.closest('tr');
                        const id = tr.getAttribute('data-id');
                        apiFetchAuth(`${API_BASE}/api/admin/shop/items/${id}`, { method: 'DELETE' }).then(() => load());
                    });
                });
            }
            function updateItemPartial(id, patch) {
                apiFetchAuth(`${API_BASE}/api/admin/shop/items/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patch)
                }).then(async (res) => {
                    if (!res.ok) {
                        try { const j = await res.json(); alert(j.error || 'Échec de la mise à jour'); } catch { alert('Échec de la mise à jour'); }
                    }
                }).catch(() => { alert('Erreur réseau'); });
            }
            function openEditModal(tr) {
                const id = tr.getAttribute('data-id');
                const modal = document.getElementById('shop-edit-modal');
                const title = document.getElementById('shop-title');
                const type = document.getElementById('shop-type');
                const price = document.getElementById('shop-price');
                const currency = document.getElementById('shop-currency');
                const active = document.getElementById('shop-active');
                const description = document.getElementById('shop-description');
                const points = document.getElementById('shop-points');
                const payment = document.getElementById('shop-payment-link');
                title.value = tr.querySelector('[data-field="title"]').textContent.trim();
                type.value = tr.querySelector('select[data-field="type"]').value;
                price.value = tr.querySelector('[data-field="price"]').textContent.trim();
                currency.value = tr.querySelector('[data-field="currency"]').textContent.trim() || 'EUR';
                active.value = tr.querySelector('select[data-field="active"]').value;
                description.value = tr.querySelector('[data-field="description"]').textContent.trim();
                points.value = '';
                payment.value = '';
                try {
                    const metaCell = tr.querySelector('[data-field="metadata"]');
                    if (metaCell) {
                        const meta = JSON.parse(metaCell.textContent || '{}');
                        points.value = meta.pointsPerMonth || '';
                        payment.value = meta.paymentLink || '';
                    }
                } catch {}
                modal.dataset.id = id;
                modal.classList.add('open');
            }
            function closeEditModal() {
                const modal = document.getElementById('shop-edit-modal');
                modal.classList.remove('open');
            }
            function saveEditModal() {
                const token = localStorage.getItem('token');
                const modal = document.getElementById('shop-edit-modal');
                const id = modal.dataset.id;
                const payload = {
                    title: document.getElementById('shop-title').value,
                    type: document.getElementById('shop-type').value,
                    price: parseFloat(document.getElementById('shop-price').value) || 0,
                    currency: document.getElementById('shop-currency').value || 'EUR',
                    active: document.getElementById('shop-active').value === '1',
                    description: document.getElementById('shop-description').value,
                    metadata: JSON.stringify({
                        pointsPerMonth: parseInt(document.getElementById('shop-points').value || '0') || undefined,
                        paymentLink: (document.getElementById('shop-payment-link').value || '').trim() || undefined,
                        proxyHost: (document.getElementById('shop-proxy-host').value || '').trim() || undefined,
                        proxyPort: parseInt(document.getElementById('shop-proxy-port').value || '0') || undefined,
                        tokenSymbol: (document.getElementById('shop-token-symbol').value || '').trim() || undefined,
                        unitPrice: parseFloat(document.getElementById('shop-unit-price').value || '0') || undefined,
                        minQty: parseInt(document.getElementById('shop-min-qty').value || '0') || undefined,
                        maxQty: parseInt(document.getElementById('shop-max-qty').value || '0') || undefined,
                        adminOnly: document.getElementById('shop-admin-only').value === '1' || undefined
                    })
                };
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_BASE}/api/admin/shop/items/${id}` : `${API_BASE}/api/admin/shop/items`;
                apiFetchAuth(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(async (res) => {
                    if (res.ok) { closeEditModal(); load(); }
                    else {
                        let msg = 'Enregistrement impossible';
                        try { const j = await res.json(); msg = j.error || msg; } catch {}
                        alert(msg);
                    }
                }).catch(() => { alert('Erreur réseau lors de l’enregistrement'); });
            }
            const addBtn = document.getElementById('add-shop-item');
            const saveBtn = document.getElementById('save-shop-item');
            const closeBtn = document.getElementById('close-shop-edit');
            if (addBtn) addBtn.addEventListener('click', () => {
                const modal = document.getElementById('shop-edit-modal');
                modal.dataset.id = '';
                ['shop-title','shop-type','shop-price','shop-currency','shop-active','shop-description'].forEach(id => {
                    const el = document.getElementById(id);
                    if (id==='shop-type') el.value = 'subscription';
                    else if (id==='shop-currency') el.value = 'EUR';
                    else if (id==='shop-active') el.value = '1';
                    else el.value = '';
                });
                modal.classList.add('open');
            });
            if (saveBtn) saveBtn.addEventListener('click', saveEditModal);
            if (closeBtn) closeBtn.addEventListener('click', () => {
                const modal = document.getElementById('shop-edit-modal');
                modal.classList.remove('open');
            });
            load();
        }

                    fetch(`${API_BASE}/api/wallet/history`, { headers: { 'Authorization': `Bearer ${token}` }})

                        }).join('');
                        histEl.innerHTML = `

                    }).catch(()=>{});
                }
            }

                fetch(`${API_BASE}/api/wallet/stake`, { method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` }, body: JSON.stringify({ amount })})
                .then(r=>r.json()).then(()=>refresh());

            if (unstakeBtn) unstakeBtn.addEventListener('click', () => {
                fetch(`${API_BASE}/api/wallet/unstake`, { method:'POST', headers:{ 'Authorization': `Bearer ${token}` }})
                .then(r=>r.json()).then(()=>refresh());
            });
            if (withdrawBtn) withdrawBtn.addEventListener('click', () => {
                const amount = parseFloat(withdrawAmt.value||'0');

                .then(r=>r.json()).then(j=>{

                    refresh();
                });
            });
            refresh();

            const headerLogout = document.getElementById('header-logout-btn');
            if (headerLogout) {
                headerLogout.addEventListener('click', () => {
                    localStorage.removeItem('token');
                    currentPage = 'login';
                    renderPage();
                });
            }
            const headerLoginBtn = document.getElementById('header-login-btn');
            if (headerLoginBtn) {
                headerLoginBtn.addEventListener('click', openLoginPanel);
            }
            refreshHeader();
        });
        // Auto-refresh data every 5 seconds to reduce latency
        setInterval(() => {
            if (!localStorage.getItem('token')) return;
            
            refreshHeader();
            
            if (currentPage === 'nodes') {
                initializeNodesPage();
            } else if (currentPage === 'referrals') {
                initializeReferralsPage();
            } else if (currentPage === 'shop') {
                initializeShopPage();
            }
        }, 5000);
    </script>
</body>
</html>
