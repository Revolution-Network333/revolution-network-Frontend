            const normalize = (s) => String(s || '').toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();

            const getLang = () => {
                const v = (document.getElementById('faq-chat-lang')?.value || 'fr');
                if (v === 'en') return 'en';
                if (v === 'es') return 'es';
                return 'fr';
            };

            const addMsg = (role, text) => {
                const body = document.getElementById('faq-chat-body');
                if (!body) return;
                const row = document.createElement('div');
                row.className = `faq-chat-msg ${role}`;
                const bubble = document.createElement('div');
                bubble.className = 'faq-chat-bubble';
                bubble.textContent = text;
                row.appendChild(bubble);
                body.appendChild(row);
                body.scrollTop = body.scrollHeight;
            };

            const addBotWithSupport = (text, showSupportBtn) => {
                const body = document.getElementById('faq-chat-body');
                if (!body) return;
                const row = document.createElement('div');
                row.className = 'faq-chat-msg bot';
                const bubble = document.createElement('div');
                bubble.className = 'faq-chat-bubble';
                bubble.textContent = text;
                row.appendChild(bubble);
                body.appendChild(row);
                if (showSupportBtn) {
                    const wrap = document.createElement('div');
                    wrap.className = 'faq-chat-msg bot';
                    const b = document.createElement('button');
                    b.className = 'faq-support-btn';
                    const lang = getLang();
                    if (lang === 'en') b.textContent = 'Create a support ticket';
                    else if (lang === 'es') b.textContent = 'Crear un ticket de soporte';
                    else b.textContent = 'Créer un ticket support';

                    b.onclick = () => {
                        const token = localStorage.getItem('token');
                        if (!token) {
                            try { openLoginPanel(); } catch {}
                            return;
                        }
                        const fd = new FormData();
                        const lang = getLang();
                        const subject = `${lang.toUpperCase()} - FAQ: ${state.lastUserQuestion || 'Question'}`;
                        const page = (typeof currentPage !== 'undefined') ? currentPage : '';
                        const msg = `Langue: ${lang}\n\nQuestion:\n${state.lastUserQuestion || ''}\n\nContexte:\nPage: ${page}`;
                        fd.append('subject', subject);
                        fd.append('message', msg);
                        fd.append('priority', 'medium');
                        fetch(`${API_BASE}/api/support/tickets`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: fd
                        })
                        .then(r => r.json())
                        .then((j) => {
                            if (j && j.id) {
                                try { setPage('support'); } catch {}
                                setTimeout(() => { try { openUserTicket(j.id, subject); } catch {} }, 400);
                                closeFaqPanel();
                            } else {
                                const lang = getLang();
                                let err = 'Création du ticket impossible. Ouvre la page Support.';
                                if (lang === 'en') err = 'Ticket creation failed. Open the Support page.';
                                else if (lang === 'es') err = 'No se pudo crear el ticket. Abre la página de Soporte.';
                                addMsg('bot', err);
                            }
                        })
                        .catch(() => {
                            const lang = getLang();
                            let err = 'Création du ticket impossible. Ouvre la page Support.';
                            if (lang === 'en') err = 'Ticket creation failed. Open the Support page.';
                            else if (lang === 'es') err = 'No se pudo crear el ticket. Abre la página de Soporte.';
                            addMsg('bot', err);
                        });
                    };
                    const bubble2 = document.createElement('div');
                    bubble2.style.maxWidth = '85%';
                    bubble2.appendChild(b);
                    wrap.appendChild(bubble2);
                    body.appendChild(wrap);
                    body.scrollTop = body.scrollHeight;
                }
                body.scrollTop = body.scrollHeight;
            };

            const matchFaq = (lang, text) => {
                const q = normalize(text);
                if (!q) return null;
                const items = faqs[lang] || faqs.fr;
                let best = null;
                let bestScore = 0;
                for (const it of items) {
                    let score = 0;
                    for (const trig of (it.triggers || [])) {
                        const t = normalize(trig);
                        if (!t) continue;
                        if (q.includes(t)) score += 3;
                        else {
                            const parts = t.split(' ').filter(Boolean);
                            let local = 0;
                            for (const p of parts) if (p.length >= 3 && q.includes(p)) local += 1;
                            score += local;
                        }
                    }
                    if (score > bestScore) {
                        bestScore = score;
                        best = it;
                    }
                }
                const confidence = Math.min(1, bestScore / 8);
                return best ? { item: best, confidence } : null;
            };

            const setQuickActions = () => {
                const qa = document.getElementById('faq-quick-actions');
                if (!qa) return;
                const lang = getLang();
                let pills = ['Airdrop', 'Points', 'Prévente', 'Application', 'Social', 'Support'];
                if (lang === 'en') pills = ['Airdrop', 'Points', 'Presale', 'Application', 'Social', 'Support'];
                if (lang === 'es') pills = ['Airdrop', 'Puntos', 'Preventa', 'Aplicación', 'Social', 'Soporte'];

                qa.innerHTML = '';
                pills.forEach((label) => {
                    const b = document.createElement('button');
                    b.className = 'faq-pill';
                    b.textContent = label;
                    b.onclick = () => handleFaqSend(label);
                    qa.appendChild(b);
                });
            };

            const openFaqPanel = () => {
                panel.classList.add('open');
                setQuickActions();
                const body = document.getElementById('faq-chat-body');
                if (body && body.childElementCount === 0) {
                    const lang = getLang();
                    let intro = "Pose une question courante. Si la FAQ ne suffit pas, crée un ticket support.";
                    if (lang === 'en') intro = "Ask a common question. If it doesn’t match the FAQ, create a support ticket.";
                    if (lang === 'es') intro = "Haz una pregunta común. Si las preguntas frecuentes no coinciden, crea un ticket de soporte.";
                    addBotWithSupport(intro, false);
                }
                setTimeout(() => {
                    const input = document.getElementById('faq-chat-input');
                    try { input && input.focus(); } catch {}
                }, 50);
            };
            const closeFaqPanel = () => panel.classList.remove('open');

            const handleFaqSend = (textOverride = '') => {
                const input = document.getElementById('faq-chat-input');
                const text = textOverride || (input ? input.value.trim() : '');
                if (!text) return;
                if (input) input.value = '';
                state.lastUserQuestion = text;
                addMsg('user', text);

                const lang = getLang();
                const m = matchFaq(lang, text);
                if (m && m.item && m.confidence >= 0.35) {
                    state.lastMatchConfidence = m.confidence;
                    addBotWithSupport(m.item.answer, false);
                    return;
                }

                state.lastMatchConfidence = m ? m.confidence : 0;
                let fallback = "Je n’ai pas trouvé une réponse FAQ exacte. Crée un ticket support et l’équipe répondra.";
                if (lang === 'en') fallback = "I couldn't find an exact FAQ match. Create a support ticket and the team will reply.";
                if (lang === 'es') fallback = "No pude encontrar una coincidencia exacta en las preguntas frecuentes. Crea un ticket de soporte y el equipo responderá.";
                addBotWithSupport(fallback, true);
            };

            btn.addEventListener('click', () => {
                if (panel.classList.contains('open')) closeFaqPanel();
                else openFaqPanel();
            });
            document.getElementById('faq-chat-close')?.addEventListener('click', closeFaqPanel);

            langSel?.addEventListener('change', () => {
                localStorage.setItem('faq_chat_lang', getLang());
                setQuickActions();
            });

            document.getElementById('faq-chat-send')?.addEventListener('click', () => handleFaqSend());
            document.getElementById('faq-chat-input')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleFaqSend();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && panel.classList.contains('open')) closeFaqPanel();
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            try { initFaqChatWidget(); } catch {}
        });

    </script>
