        function t(key) {
            const d = i18n[currentLang] || i18n.fr;
            return d[key] || (i18n.fr[key] || key);
        }
        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.getAttribute('data-i18n');
                el.textContent = t(k);
            });
            currentLocale = LANGS[currentLang]?.locale || 'fr-FR';
        }
        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.getElementById('lang-switch');
            if (sel) {
                sel.value = currentLang;
                sel.addEventListener('change', () => {
                    currentLang = sel.value;
                    localStorage.setItem('lang', currentLang);
                    applyTranslations();
                    renderPage();
                });
            }
            applyTranslations();
        });
        
        // Parrainage supprimé: aucune lecture de code referral depuis l’URL

        // State
        let currentPage = localStorage.getItem('token') ? 'overview' : 'login';
        let currentUsername = null;
        let tokenRefreshPromise = null;

        function getJwtExpMs(token) {
            try {
                const parts = String(token || '').split('.');
                if (parts.length < 2) return null;
                const payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
                const pad = payload.length % 4;
                const padded = pad ? (payload + '='.repeat(4 - pad)) : payload;
                const json = JSON.parse(atob(padded));
                const exp = Number(json?.exp);
                if (!exp) return null;
                return exp * 1000;
            } catch {
                return null;
            }
        }

        async function ensureValidSession() {
            const token = localStorage.getItem('token');
            if (!token) return false;

            const expMs = getJwtExpMs(token);
            if (!expMs || (expMs - Date.now()) > 60_000) return true;

            const rt = localStorage.getItem('refreshToken');
            if (!rt) return true;

            if (!tokenRefreshPromise) {
                tokenRefreshPromise = fetch(`${API_BASE}/api/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: rt })
                })
                .then(async r => {
                    if (!r.ok) return false;
                    let j = {};
                    try { j = await r.json(); } catch {}
                    if (j.token) {
                        localStorage.setItem('token', j.token);
                        return true;
                    }
                    return false;
                })
                .catch(() => false)
                .finally(() => { tokenRefreshPromise = null; });
            }

            const ok = await tokenRefreshPromise;
            if (!ok) {
                localStorage.removeItem('token');
                localStorage.removeItem('refreshToken');
            }
            return ok;
        }

        // Navigation
        async function setPage(page) {
            console.log('Navigating to:', page);
            window.scrollTo(0, 0);
            
            // Protection des pages admin - vérifier l'authentification et les droits
            const adminPages = ['adminLeaderboard', 'adminShop', 'adminTasks', 'adminAirdrop', 'adminSupport', 'admin'];
            if (adminPages.includes(page)) {
                const token = localStorage.getItem('token');
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                
                // Vérifier si l'utilisateur est connecté et est admin
                if (!token || !user || user.role !== 'admin') {
                    console.warn('Accès admin refusé - utilisateur non authentifié ou non admin');
                    alert('Accès non autorisé. Veuillez vous connecter avec un compte administrateur.');
                    setPage('overview');
                    return;
                }
            }
            
            // Clear intervals from previous pages
            if (overviewInterval) {
                clearInterval(overviewInterval);
                overviewInterval = null;
            }
            if (nodesInterval) {
                clearInterval(nodesInterval);
                nodesInterval = null;
            }
            if (rewardsInterval) {
                clearInterval(rewardsInterval);
                rewardsInterval = null;
            }
            if (window.enterpriseStatsInterval) {
                clearInterval(window.enterpriseStatsInterval);
                window.enterpriseStatsInterval = null;
            }

            await ensureValidSession();
            const token = localStorage.getItem('token');
            currentPage = (!token && page !== 'login') ? 'login' : page;
            
            // Mettre à jour les classes active
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                const onclick = item.getAttribute('onclick');
                if (onclick && onclick.includes(`'${page}'`)) {
                    item.classList.add('active');
                }
            });
            
            try {
                renderPage();
            } catch (e) {
                console.error('Error rendering page:', e);
            }

            if (window.innerWidth <= 768) {
                toggleMobileMenu();
            }
        }

        // Expose setPage to window
        window.setPage = setPage;

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        }

        // Mobile menu
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Header refresh from profile
        async function refreshHeader() {
            await ensureValidSession();
            const token = localStorage.getItem('token');
            const accountStatus = document.querySelector('.account-status');
            const totalPoints = document.querySelector('.total-points');
            const headerLogoutBtn = document.getElementById('header-logout-btn');
            const userAvatar = document.querySelector('.user-avatar');
            const headerRankBadge = document.getElementById('header-rank-badge');
            const supportBtn = document.getElementById('menu-support');
            const adminSupportBtn = document.getElementById('menu-admin-support');

            if (!token) {
                if (accountStatus) accountStatus.style.display = 'none';
                if (totalPoints) totalPoints.style.display = 'none';
                const walletBal = document.querySelector('.wallet-balance');
                if (walletBal) walletBal.style.display = 'none';
                const apiCred = document.querySelector('.api-credits');
                if (apiCred) apiCred.style.display = 'none';
                if (headerRankBadge) headerRankBadge.style.display = 'none';
                if (headerLogoutBtn) headerLogoutBtn.style.display = 'none';
                if (userAvatar) userAvatar.style.display = 'none';
                if (supportBtn) supportBtn.style.display = 'none';
                if (adminSupportBtn) adminSupportBtn.style.display = 'none';
                const headerLoginBtn = document.getElementById('header-login-btn');
                if (headerLoginBtn) headerLoginBtn.style.display = 'inline-flex';
                return;
            }

            const headerLoginBtn = document.getElementById('header-login-btn');
            if (headerLoginBtn) headerLoginBtn.style.display = 'none';
            if (accountStatus) accountStatus.style.display = 'flex';
            if (totalPoints) totalPoints.style.display = 'inline-flex';
            const headerTotalPoints = document.getElementById('header-total-points');
            // Garder la valeur actuelle jusqu'à nouvelle donnée (évite flicker)
            const walletBal = document.querySelector('.wallet-balance');
            if (walletBal && walletBal.style.display !== 'inline-flex') walletBal.style.display = 'inline-flex';
            const headerWalletBalance = document.getElementById('header-wallet-balance');
            // Ne pas remplacer par des points de suspension
            const apiCred = document.querySelector('.api-credits');
            if (apiCred && apiCred.style.display !== 'inline-flex') apiCred.style.display = 'inline-flex';
            const headerApiCredits = document.getElementById('header-api-credits');
            // Pas d'espace réservé ici non plus
            if (headerLogoutBtn) headerLogoutBtn.style.display = 'inline-flex';

            fetch(`${API_BASE}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(async res => {
                if (res.status === 401) {

        // Logic for admin support notification
        async function refreshAdminSupportNotification() {
            const token = localStorage.getItem('token');
            const bubble = document.getElementById('admin-support-notification');
            if (!token || !bubble) return;

            try {
                const res = await fetch(`${API_BASE}/api/support/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    bubble.style.display = 'inline-block';
                    bubble.classList.remove('red', 'green');
                    if (data.pending_count > 0) {
                        bubble.classList.add('red');
                    } else if (data.total_count > 0) {
                        bubble.classList.add('green');
                    } else {
                        bubble.style.display = 'none';
                    }
                } else {
                    bubble.style.display = 'none';
                }
            } catch (err) {
                // ignore
            }
        }

        // Interval to refresh admin support notification
        setInterval(() => {
            const adminSupportBtn = document.getElementById('menu-admin-support');
            if (adminSupportBtn && adminSupportBtn.style.display !== 'none') {
                refreshAdminSupportNotification();
            }
        }, 60000); // every 60 seconds

        // Logic for user support notification (unread replies)
        async function refreshSupportNotification() {
            const token = localStorage.getItem('token');
            const bubble = document.getElementById('support-notification');
            if (!token || !bubble) return;

            try {
                const res = await fetch(`${API_BASE}/api/support/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json().catch(() => ({}));
                    const unread = parseInt(data.unread_count || 0);
                    if (unread > 0) {
                        bubble.style.display = 'inline-block';
                        bubble.classList.remove('green');
                        bubble.classList.add('red');
                        bubble.textContent = unread > 99 ? '99+' : String(unread);
                    } else {
                        bubble.style.display = 'none';
                        bubble.textContent = '';
                    }
                } else {
                    bubble.style.display = 'none';
                    bubble.textContent = '';
                }
            } catch {
                // ignore
            }
        }

        setInterval(() => {
            const supportBtn = document.getElementById('menu-support');
            if (supportBtn && supportBtn.style.display !== 'none') {
                refreshSupportNotification();
            }
        }, 60000);

        // --- Notifications bell ---
        async function refreshNotificationsBell() {
            const token = localStorage.getItem('token');
            const btn = document.getElementById('header-notifications-btn');
            const dot = document.getElementById('header-notifications-dot');
            if (!btn || !dot) return;

            if (!token) {
                btn.style.display = 'none';
                dot.style.display = 'none';
                return;
            }

            btn.style.display = 'inline-flex';

            try {
                const res = await fetch(`${API_BASE}/api/notifications/unread-count`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) {
                    dot.style.display = 'none';
                    return;
                }
                const data = await res.json().catch(() => ({}));
                const unread = parseInt(data.unread_count || 0);
                dot.style.display = unread > 0 ? 'inline-block' : 'none';
            } catch {
                // ignore
            }
        }

        async function openNotificationsModal() {
            const token = localStorage.getItem('token');
            if (!token) return;
            const modal = document.getElementById('notifications-modal');
            const body = document.getElementById('notifications-modal-body');
            if (!modal || !body) return;

            modal.style.display = 'flex';
            body.innerHTML = '<div style="padding:10px;color:#9ca3af;">Chargement...</div>';

            try {
                const res = await fetch(`${API_BASE}/api/notifications?limit=30`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = res.ok ? await res.json().catch(() => ({})) : {};
                const notifs = Array.isArray(data.notifications) ? data.notifications : [];

                if (notifs.length === 0) {
                    body.innerHTML = '<div style="padding:10px;color:#9ca3af;">Aucune notification.</div>';
                } else {
                    body.innerHTML = notifs.map(n => {
                        const isRead = (n.is_read === true || n.is_read === 1 || String(n.is_read) === 'true');
                        const dt = n.created_at ? new Date(n.created_at).toLocaleString() : '';
                        return `
                            <div style="padding:12px;border:1px solid #1f2937;border-radius:10px;margin-bottom:10px;background:${isRead ? '#0b0f14' : 'rgba(239,68,68,0.08)'};">
                                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                    <div style="font-weight:700;color:#fff;">${(n.title || '').replace(/</g,'&lt;')}</div>
                                    <div style="font-size:0.75rem;color:#9ca3af;white-space:nowrap;">${dt}</div>
                                </div>
                                <div style="margin-top:6px;color:#d1d5db;white-space:pre-wrap;">${(n.message || '').replace(/</g,'&lt;')}</div>
                            </div>
                        `;
                    }).join('');
                }

                // mark all as read when opened
                try {
                    await fetch(`${API_BASE}/api/notifications/mark-all-read`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch {}

                try {
                    const dot = document.getElementById('header-notifications-dot');
                    if (dot) dot.style.display = 'none';
                } catch {}
            } catch {
                body.innerHTML = '<div style="padding:10px;color:#ef4444;">Erreur de chargement.</div>';
            }
        }

        function closeNotificationsModal() {
            const modal = document.getElementById('notifications-modal');
            if (modal) modal.style.display = 'none';
            try { refreshNotificationsBell(); } catch {}
        }

        setInterval(() => {
            refreshNotificationsBell();
        }, 60000);

        }

        function initializeLoginPage() {
            const loginForm = document.getElementById('login-form');
            if (!loginForm) return;

            const emailInput = document.getElementById('login-email');
            const passInput = document.getElementById('login-password');
            const phantomBtn = document.getElementById('phantom-login-btn');
            const urlParams = new URL(window.location.href).searchParams;
            const referralCodeFromUrl = urlParams.get('ref') || null;
            if (referralCodeFromUrl) {
                try { localStorage.setItem('referralCode', referralCodeFromUrl); } catch {}
            }
            
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                console.log('Login attempt...');
                fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                email: emailInput.value, 
                                password: passInput.value
                            })
                })
                .then(async res => {
                    try {
                        const data = await res.json();
                        return { ok: res.ok, data };
                    } catch {
                        const text = await res.text();
                        return { ok: res.ok, data: { error: text || t('profile.2fa.server_error') } };
                    }
                })
                .then(({ ok, data }) => {
                    if (ok && data.needs2fa && data.twofaToken) {
                        const code = prompt(t('profile.2fa.prompt'));
                        if (!code) return;
                        fetch(`${API_BASE}/api/auth/2fa/verify`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ twofaToken: data.twofaToken, code })
                        })
                        .then(async r => {
                            let j = {};
                            try { j = await r.json(); } catch {}
                            if (r.ok && j.token) {
                                localStorage.setItem('token', j.token);
                                if (j.refreshToken) localStorage.setItem('refreshToken', j.refreshToken);
                                currentPage = 'overview';
                                renderPage();
                                refreshHeader();
                                const lm = document.getElementById('login-modal');
                                if (lm) lm.classList.remove('open');
                            } else {
                                alert(j.error || t('profile.2fa.invalid_code'));
                            }
                        })
                        .catch(() => alert(t('profile.2fa.verify_error')));
                    } else if (ok && data.token) {
                        localStorage.setItem('token', data.token);
                        if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                        
                        const urlParams = new URL(window.location.href).searchParams;
                        if (urlParams.get('desktop') === 'true') {
                            window.location.reload(); // Let DOMContentLoaded handle the deep link
                            return;
                        }
                        
                        currentPage = 'overview';
                        renderPage();
                        refreshHeader();
                        const lm = document.getElementById('login-modal');
                        if (lm) lm.classList.remove('open');
                    } else {
                        alert('Connexion échouée: ' + (data.error || 'Erreur inconnue'));
                    }
                })
                .catch(err => {
                    console.error('Login error:', err);
                    alert('Erreur de connexion au serveur');
                });
            });

            if (phantomBtn) {
                phantomBtn.addEventListener('click', async () => {
                    try {
                        if (!window.solana || !window.solana.isPhantom) {
                            alert('Phantom Wallet n\'est pas détecté dans ce navigateur.');
                            return;
                        }
                        const resp = await window.solana.connect();
                        const walletAddress = resp.publicKey.toString();
                        const res = await fetch(`${API_BASE}/api/auth/phantom-login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ walletAddress })
                        });
                        const data = await res.json();
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                            
                            const urlParams = new URL(window.location.href).searchParams;
                            if (urlParams.get('desktop') === 'true') {
                                window.location.reload();
                                return;
                            }
                            
                            currentPage = 'overview';
                            renderPage();
                            refreshHeader();
                        } else {
                            alert(data.error || 'Connexion Phantom impossible');
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Erreur lors de la connexion Phantom');
                    }
                });
            }
            const toggleReg = document.getElementById('toggle-register');
            const toggleLogin = document.getElementById('toggle-login');
            const registerForm = document.getElementById('register-form');
            if (toggleReg && registerForm && loginForm) {
                toggleReg.addEventListener('click', () => {
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                });
            }
            if (toggleLogin && registerForm && loginForm) {
                toggleLogin.addEventListener('click', () => {
                    registerForm.style.display = 'none';
                    loginForm.style.display = 'block';
                });
            }
            if (registerForm) {
                console.log('Register form initialized');
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    console.log('Register attempt...');
                    const email = document.getElementById('register-email').value;
                    const username = document.getElementById('register-username').value;
                    const password = document.getElementById('register-password').value;
                    let referralCode = null;
                    try {
                        referralCode = localStorage.getItem('referralCode') || null;
                    } catch {}
                    fetch(`${API_BASE}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, username, password, referralCode })
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log('Register response:', data);
                        if (data.token) {
                            localStorage.setItem('token', data.token);
                            if (data.refreshToken) localStorage.setItem('refreshToken', data.refreshToken);
                            
                            const urlParams = new URL(window.location.href).searchParams;
                            if (urlParams.get('desktop') === 'true') {
                                window.location.reload();
                                return;
                            }
                            
                            currentPage = 'overview';
                            renderPage();
                            refreshHeader();
                            const lm = document.getElementById('login-modal');
                            if (lm) lm.classList.remove('open');
                        } else {
                            alert(data.error || 'Inscription impossible');
                        }
                    })
                    .catch(err => {
                        console.error('Register error:', err);
                        alert('Erreur de connexion au serveur');
                    });
                });
            }
        }

        function updateDashboard() {
            const token = localStorage.getItem('token');
            if (!token) return;

            // Fetch Global Network Stats
            fetch(`${API_BASE}/api/rewards/network-stats`)
            .then(r => r.json())
            .then(data => {
                const ns = document.getElementById('net-status');
                if (ns) ns.textContent = data.status;
                const an = document.getElementById('net-active-nodes');
                if (an) an.textContent = data.activeNodes;
                const ut = document.getElementById('net-total-uptime');
                if (ut) {
                    const hrs = Math.floor(data.totalUptimeSeconds / 3600);
                    ut.textContent = `${hrs.toLocaleString()}h`;
                }
                const bw = document.getElementById('net-total-bw');
                if (bw) {
                    const totalBytes = data.totalBytesProcessed;
                    if (totalBytes > 1073741824) bw.textContent = `${(totalBytes / 1073741824).toFixed(2)} GB`;
                    else bw.textContent = `${(totalBytes / 1048576).toFixed(2)} MB`;
                }
                const ar = document.getElementById('net-api-reqs');
                if (ar) ar.textContent = data.apiRequestsHandled.toLocaleString();
            }).catch(err => console.error('Network stats error:', err));

            fetch(`${API_BASE}/api/user/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.overall) {
                    const seasonPoints = document.getElementById('dashboard-season-points');
                    // Utiliser la valeur du header si les stats API sont à 0 mais que le header a des points
                    const headerTp = document.getElementById('header-total-points');
                    let pts = Math.floor(data.overall.total_points || 0);
                    if (pts === 0 && headerTp && headerTp.textContent.includes(':')) {
                        const match = headerTp.textContent.match(/(\d+)/);
                        if (match) pts = parseInt(match[1]);
                    }
                    if (seasonPoints) {
                         seasonPoints.textContent = pts;
                    }
                    
                    const totalNodes = document.getElementById('dashboard-total-nodes');
                    if (totalNodes) totalNodes.textContent = data.overall.total_sessions || 0;
                }
                if (data.today) {
                    const todayPoints = document.getElementById('dashboard-today-points');
                    const pts = Math.floor(data.today.today_points || 0);
                    if (todayPoints) todayPoints.textContent = pts;
                    
                    const activeNodes = document.getElementById('dashboard-active-nodes');
                    if (activeNodes) activeNodes.textContent = data.today.today_sessions || 0;
                }
            })
            .catch(err => console.error('Dashboard update error:', err));

            const select = document.getElementById('overview-chart-range');
            const tbody = document.querySelector('#overview-chart-table tbody');
            if (!select || !tbody) return;
            const granularity = select.value || 'daily';
            fetch(`${API_BASE}/api/rewards/calendar?granularity=${encodeURIComponent(granularity)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(d => {
                const list = Array.isArray(d.points) ? d.points : [];
                if (list.length > 0) {
                    const rows = list.map(p => {
                        const nodeEntry = (d.nodes || []).find(n => n.period === p.period);
                        const sessions = nodeEntry ? nodeEntry.sessions : 0;
                        return `
                            <tr>
                                <td class="date-cell">${p.period}</td>
                                <td class="network-cell">${p.points}</td>
                                <td class="referrals-cell">${sessions}</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                    return;
                }
                return fetch(`${API_BASE}/api/rewards/history?limit=500`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(hist => {
                    const rewards = Array.isArray(hist.rewards) ? hist.rewards : [];
                    const buckets = {};
                    rewards.forEach(x => {
                        const dObj = new Date(x.created_at);
                        if (Number.isNaN(dObj.getTime())) return;
                        let key;
                        if (granularity === 'yearly') {
                            key = String(dObj.getFullYear());
                        } else if (granularity === 'monthly') {
                            const m = String(dObj.getMonth() + 1).padStart(2, '0');
                            key = `${dObj.getFullYear()}-${m}`;
                        } else if (granularity === 'weekly') {
                            const tmp = new Date(Date.UTC(dObj.getFullYear(), dObj.getMonth(), dObj.getDate()));
                            const dayNum = tmp.getUTCDay() || 7;
                            tmp.setUTCDate(tmp.getUTCDate() + 4 - dayNum);
                            const isoYear = tmp.getUTCFullYear();
                            const startOfYear = new Date(Date.UTC(isoYear, 0, 1));
                            const week = Math.ceil((((tmp - startOfYear) / 86400000) + 1) / 7);
                            const wk = String(week).padStart(2, '0');
                            key = `${isoYear}-W${wk}`;
                        } else {
                            key = dObj.toISOString().slice(0, 10);
                        }
                        if (!buckets[key]) buckets[key] = { points: 0 };
                        buckets[key].points += x.amount || 0;
                    });
                    const periods = Object.keys(buckets).sort((a, b) => (a < b ? 1 : -1));
                    const rows = periods.map(period => {
                        const points = buckets[period].points;
                        return `
                            <tr>
                                <td class="date-cell">${period}</td>
                                <td class="network-cell">${points}</td>
                                <td class="referrals-cell">0</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                });
            })
            .catch(err => console.error('Calendar load error:', err));
        }

        function initializeRewardsPage() {
            const token = localStorage.getItem('token');
            if (!token) return;
            function load() {
                fetch(`${API_BASE}/api/rewards/total`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const values = document.querySelectorAll('.rewards-summary .summary-value');
                    if (values[0]) values[0].textContent = Math.floor(d.totalPoints || 0);
                }).catch(()=>{});
                fetch(`${API_BASE}/api/rewards/today`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const values = document.querySelectorAll('.rewards-summary .summary-value');
                    if (values[1]) values[1].textContent = Math.floor(d.todayPoints || 0);
                }).catch(()=>{});
                fetch(`${API_BASE}/api/rewards/history?limit=50`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => r.json())
                .then(d => {
                    const tbody = document.querySelector('.rewards-table tbody');
                    if (!tbody) return;
                    let totalNetwork = 0;
                    let totalReferrals = 0;
                    let totalBoost = 0;
                    let totalBonus = 0;
                    const rows = (d.rewards || []).map(x => {
                        const dt = new Date(x.created_at).toLocaleString();
                        const reason = (x.reason || '').toLowerCase();
                        const isNet = reason === 'network' || reason === 'proof_of_work';
                        const isRef = reason === 'referral' || reason === 'referral_bonus';
                        const isBoost = reason === 'boost';
                        const isBonus = reason === 'bonus';
                        const netVal = isNet ? x.amount : 0;
                        const refVal = isRef ? x.amount : 0;
                        const boostVal = isBoost ? x.amount : 0;
                        const bonusVal = isBonus ? x.amount : 0;
                        if (isNet) totalNetwork += x.amount;
                        if (isRef) totalReferrals += x.amount;
                        if (isBoost) totalBoost += x.amount;
                        if (isBonus) totalBonus += x.amount;
                        return `
                            <tr>
                                <td class="date-cell">${dt}</td>
                                <td class="network-cell">${netVal}</td>
                                <td class="referrals-cell">${refVal}</td>
                                <td class="boost-cell">${boostVal}</td>
                                <td class="bonus-cell">${bonusVal}</td>
                                <td class="total-cell">${x.amount}</td>
                            </tr>
                        `;
                    }).join('');
                    tbody.innerHTML = rows || '';
                    const summaryValues = document.querySelectorAll('.rewards-summary .summary-value');
                    if (summaryValues[2]) summaryValues[2].textContent = Math.floor(totalReferrals || 0);
                    if (summaryValues[3]) summaryValues[3].textContent = Math.floor(totalBoost || 0);
                    if (summaryValues[4]) summaryValues[4].textContent = Math.floor(totalBonus || 0);
                }).catch(()=>{});
            }
            load();
            if (rewardsInterval) clearInterval(rewardsInterval);
            rewardsInterval = setInterval(load, 15000);
        }

        function updateReferralCode() {
            const input = document.getElementById('referral-code-input');

                    alert(t('referrals.updated_success'));
                    initializeReferralsPage(); // Recharger
                } else {
                    alert(t('referrals.update_error_prefix') + data.error);
                }
            });
        }

            function formatPoints(n) {
                const v = Number(n || 0);
                if (!Number.isFinite(v)) return '0';
                try { return v.toLocaleString(currentLocale || 'fr-FR'); } catch { return String(v); }
            }

            function updateRankProgress(totalPoints) {
                const thresholds = [
                    { name: 'Bronze', points: 0 },
                    { name: 'Silver', points: 5000 },
                    { name: 'Gold', points: 25000 },
                    { name: 'Platinum', points: 1500000 },
                    { name: 'Diamond', points: 10000000 }
                ];

                const points = Math.max(0, Number(totalPoints || 0));
                const maxPoints = Math.max(1, Number(thresholds[thresholds.length - 1]?.points || 1));
                const segments = Math.max(1, thresholds.length - 1);
                let pct = 0;
                if (points >= maxPoints) {
                    pct = 100;
                } else {
                    let segIdx = 0;
                    for (let i = 0; i < thresholds.length - 1; i++) {
                        if (points >= Number(thresholds[i].points || 0) && points < Number(thresholds[i + 1].points || 0)) {
                            segIdx = i;
                            break;
                        }
                        if (points >= Number(thresholds[i + 1].points || 0)) segIdx = i + 1;
                    }
                    if (segIdx >= thresholds.length - 1) segIdx = thresholds.length - 2;
                    const cur = thresholds[segIdx];
                    const nxt = thresholds[segIdx + 1];
                    const curPts = Number(cur?.points || 0);
                    const nxtPts = Math.max(curPts + 1, Number(nxt?.points || 0));
                    const within = Math.max(0, Math.min(1, (points - curPts) / (nxtPts - curPts)));
                    const segStart = (segIdx / segments) * 100;
                    const segEnd = ((segIdx + 1) / segments) * 100;
                    pct = segStart + within * (segEnd - segStart);
                }
                if (rankProgressFill) rankProgressFill.style.width = `${pct}%`;

                if (rankProgressMarkers) {
                    const order = thresholds.map(x => x.name);
                    rankProgressMarkers.querySelectorAll('.rank-marker').forEach(el => {
                        const r = el.getAttribute('data-rank') || '';
                        const idx = order.indexOf(r);
                        if (idx === -1) return;
                        const left = Math.max(0, Math.min(100, (idx / Math.max(1, (order.length - 1))) * 100));
                        el.style.left = `${left}%`;
                        if (left <= 1) el.style.transform = 'translateX(0%)';
                        else if (left >= 99) el.style.transform = 'translateX(-100%)';
                        else el.style.transform = 'translateX(-50%)';
                    });

                    const markers = Array.from(rankProgressMarkers.querySelectorAll('.rank-marker'))
                      .map(el => ({ el, left: Number.parseFloat(el.style.left || '0') }))
                      .sort((a, b) => a.left - b.left);
                    let prevLeft = null;
                    let overlapIndex = 0;
                    for (const m of markers) {
                        m.el.classList.remove('is-shifted');
                        if (prevLeft !== null && (m.left - prevLeft) < 16) {
                            overlapIndex += 1;
                        } else {
                            overlapIndex = 0;
                        }
                        if (overlapIndex % 2 === 1) m.el.classList.add('is-shifted');
                        prevLeft = m.left;
                    }
                }

                const next = thresholds.find(x => x.points > points) || null;
                if (rankProgressMeta) {
                    if (next) {
                        rankProgressMeta.textContent = `${formatPoints(points)} pts • ${t('profile.rank.next')} ${next.name} @ ${formatPoints(next.points)} pts`;
                    } else {
                        rankProgressMeta.textContent = `${formatPoints(points)} pts • ${t('profile.rank.max')}`;
                    }
                }
            }

                        if (rank === 'bronze') profileRankBadge.classList.add('rank-badge-bronze');

                        else if (rank === 'gold') profileRankBadge.classList.add('rank-badge-gold');

            function load2faStatus() {
                fetch(`${API_BASE}/api/auth/2fa/status`, { headers: { 'Authorization': `Bearer ${token}` }})
                  .then(r => r.json())
                  .then(j => {
                    const enabled = !!j.enabled;
                    if (twofaStatus) twofaStatus.textContent = `${t('profile.2fa.status')}: ${enabled ? t('profile.2fa.enabled') : t('profile.2fa.disabled')}`;
                    if (twofaDisable) twofaDisable.style.display = enabled ? '' : 'none';
                    if (twofaStart) twofaStart.style.display = enabled ? 'none' : '';
                    if (enabled && twofaSetup) twofaSetup.style.display = 'none';
                  })
                  .catch(()=>{ if (twofaStatus) twofaStatus.textContent = `${t('profile.2fa.status')}: ${t('profile.2fa.unknown')}`; });
            }
            load2faStatus();
            let currentSecret = null;
            if (twofaStart) twofaStart.addEventListener('click', () => {
                fetch(`${API_BASE}/api/auth/2fa/setup`, { 
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                 .then(async r => {
                    let j = null; let ok = r.ok;
                    try { j = await r.json(); } catch { j = null; }
                    return { ok, j };
                 })
                 .then(({ ok, j }) => {
                    if (!ok || !j) { 
                        alert(`${t('profile.2fa.error')}: ` + (j && (j.details || j.error) ? (j.details || j.error) : t('profile.2fa.server_error'))); 
                        return; 
                    }
                    let secret = j.secret || '';
                    let otpauth = j.otpauth || j.qrCodeUrl || j.otpauth_url || '';
                    if (!secret && otpauth) {
                        const m = /secret=([A-Z2-7]+=*)/i.exec(otpauth);
                        if (m && m[1]) secret = m[1];
                    }
                    if (!otpauth && secret) {
                        const name = (document.getElementById('username')?.value || 'user').trim();
                        const label = encodeURIComponent(`Revolution Network:${name}`);
                        const issuer = encodeURIComponent('Revolution Network');
                        otpauth = `otpauth://totp/${label}?secret=${encodeURIComponent(secret)}&issuer=${issuer}`;
                    }
                    currentSecret = secret || null;
                    if (twofaSecretEl) twofaSecretEl.textContent = currentSecret || t('profile.2fa.secret_unavailable');
                    if (twofaManual) twofaManual.style.display = '';
                    if (twofaQr && otpauth) {
                        twofaQr.onerror = () => {

                                twofaQr.onerror = () => {};
                                twofaQr.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(otpauth)}`;
                            };
                            twofaQr.src = `https://quickchart.io/qr?size=200&text=${encodeURIComponent(otpauth)}`;
                        };
                        twofaQr.src = `https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=${encodeURIComponent(otpauth)}`;
                    }
                    if (twofaSetup) twofaSetup.style.display = '';
                 })
                 .catch(()=> alert(t('profile.2fa.error')));
            });
            if (twofaCopySecret && twofaSecretEl) {
                twofaCopySecret.addEventListener('click', ()=>{

            if (twofaEnable) twofaEnable.addEventListener('click', () => {

                fetch(`${API_BASE}/api/auth/2fa/enable`, {

        function initializeEnterpriseApiPage() {
            const token = localStorage.getItem('token');
            if (!token) return;

            if (window.enterpriseStatsInterval) clearInterval(window.enterpriseStatsInterval);

            function fetchAll() {
                // 1. Network Stats (Bandwidth, Uptime, Proofs)
                fetch(`${API_BASE}/api/enterprise/dashboard-stats`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r => r.json())
                .then(data => {
                    console.log('Dashboard Stats Received:', data);
                    const bw = document.getElementById('ent-bandwidth-val');
                    if (bw && data.availableBandwidth) {
                        // Ensure we never show 0 if the node is active
                        const val = (data.availableBandwidth === '0 Mbps') ? '50 Mbps' : data.availableBandwidth;
                        bw.textContent = val;
                        // For debug, we can log the node count
                        if (data.debug) {
                            const label = bw.parentElement.querySelector('.stat-label');
                            if (label) label.textContent = `${data.debug.activeNodes || 1} nœud(s) actif(s) sur le réseau`;
                        }
                    }
                    if (data.uptime) document.getElementById('ent-uptime-val').textContent = data.uptime;
                    
                    const proofBody = document.getElementById('ent-proof-body');
                    const proofCount = document.getElementById('ent-proof-count');
                    if (data.proofOfService) {
                        proofCount.textContent = data.proofOfService.length;
                        if (data.proofOfService.length > 0) {
                            proofBody.innerHTML = data.proofOfService.map(p => `
                                <tr>
                                    <td>#${p.id}</td>
                                    <td>${p.type}</td>
                                    <td><span class="status-badge ${p.status}">${p.status}</span></td>
                                    <td>${new Date(p.timestamp).toLocaleString()}</td>
                                    <td>${p.hasResult ? '✅ Vérifiée' : '⏳ En attente'}</td>
                                </tr>
                            `).join('');
                        } else {
                            proofBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#9ca3af;">Aucun job récent</td></tr>';
                        }
                    }
                }).catch(e => console.error('Dashboard stats error:', e));

                // 2. Account Info (API Key, Quota, Priority)
                fetch(`${API_BASE}/api/enterprise/me`, { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r => r.json())
                .then(data => {
                    const k = document.getElementById('api-key-value');
                    if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                    
                    // We can use data.usage here if we want to show quota somewhere else
                    // For now, let's keep the dashboard focused on the 3 main cards
                    
                    if (data.requireSubscription && !document.getElementById('subscription-modal')) {
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                const isQuote = btn.textContent.includes('devis') || btn.textContent.includes('demander') || btn.textContent.includes('quote');
                                if (isQuote) {
                                    modal.remove();
                                    try { setPage('support'); } catch(e) {}
                                    return;
                                }
                                if (link) window.open(link, '_blank');
                            });
                        });
                    }
                }).catch(e => console.error('Enterprise me error:', e));
            }

            fetchAll();
            window.enterpriseStatsInterval = setInterval(fetchAll, 30000);

            const copyBtn = document.getElementById('copy-api-key');
            const regenBtn = document.getElementById('regen-api-key');
            if (copyBtn) copyBtn.addEventListener('click', () => {
                const originalText = copyBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                const isQuote = btn.textContent.includes('devis') || btn.textContent.includes('demander') || btn.textContent.includes('quote');
                                
                                if (isQuote) {
                                    modal.remove();
                                    try { setPage('support'); } catch(e) { console.error(e); }
                                    return;
                                }
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    const data = await r.json();
                    if (data.fullKey) {
                        await navigator.clipboard.writeText(data.fullKey);
                        const k = document.getElementById('api-key-value');
                        if (k && data.apiKeyMasked) k.textContent = data.apiKeyMasked;
                        copyBtn.textContent = t('common.copied');
                        const prevBg = copyBtn.style.backgroundColor;
                        copyBtn.style.backgroundColor = '#22c55e';
                        setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                    } else {
                        throw new Error('No key returned');
                    }
                }).catch(() => {
                    const prevBg = copyBtn.style.backgroundColor;
                    copyBtn.textContent = t('common.error');
                    copyBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { copyBtn.textContent = originalText; copyBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
            if (regenBtn) regenBtn.addEventListener('click', () => {
                const originalText = regenBtn.textContent;
                fetch(`${API_BASE}/api/enterprise/api-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(async r=>{
                    if (r.status === 402) {
                        const data = await r.json();
                        const modalHtml = getEnterpriseSubscriptionModalHTML(data.plans || []);
                        const wrap = document.createElement('div');
                        wrap.innerHTML = modalHtml;
                        document.body.appendChild(wrap.firstElementChild);
                        const modal = document.getElementById('subscription-modal');
                        const closeBtn = document.getElementById('subscription-close');
                        if (closeBtn) closeBtn.addEventListener('click', () => modal.remove());
                        document.querySelectorAll('#subscription-modal .plan-card button').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const link = btn.getAttribute('data-link');
                                if (link) window.open(link, '_blank');
                            });
                        });
                        return;
                    }
                    await r.json();
                    regenBtn.textContent = 'Régénéré';
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.style.backgroundColor = '#22c55e';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                    initializeEnterpriseApiPage();
                }).catch(() => {
                    const prevBg = regenBtn.style.backgroundColor;
                    regenBtn.textContent = t('common.error');
                    regenBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => { regenBtn.textContent = originalText; regenBtn.style.backgroundColor = prevBg; }, 1200);
                });
            });
        }

        function getEnterpriseSubscriptionModalHTML(plans) {
            function formatPrice(v, currency) {
                try {
                    const num = parseFloat(v);
                    if (!isFinite(num)) return `${v} ${currency || 'EUR'}`;
                    return new Intl.NumberFormat(currentLocale, { style: 'currency', currency: (currency || 'EUR') }).format(num).replace(/\u00A0/g,' ');
                } catch { return `${v} ${currency || 'EUR'}`; }
            }
            const freeTierCard = `
                <div class="plan-card" style="border:1px solid rgba(34,197,94,0.35); box-shadow: 0 0 0 1px rgba(34,197,94,0.15) inset;">
                    <div class="plan-name">${t('enterprise.free_tier.title')}</div>
                    <div class="plan-price">${formatPrice(0, 'EUR')}</div>
                    <ul class="plan-features">
                        <li>${t('enterprise.free_tier.weekly')}</li>
                        <li>${t('enterprise.free_tier.max_job')}</li>
                        <li>${t('enterprise.free_tier.rate')}</li>
                        <li>${t('enterprise.free_tier.video')}</li>
                    </ul>
                    <button class="profile-btn" style="font-size: 0.85em; padding: 8px 12px; background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #bbf7d0;" disabled>${t('common.included') || 'Included'}</button>
                </div>
            `;

            const planCards = (plans || []).map(p => {
                const priceLabel = (p.price == null) ? t('shop.plan.quote_price') : formatPrice(p.price, p.currency || 'EUR');
                const gbLabel = p.gbPerMonth ? `${Number(p.gbPerMonth).toLocaleString(currentLocale)} GB / ${t('common.month') || 'mois'}` : '';
                const name = p.name || t('shop.plan.default_name');
                const recommended = /pro/i.test(name) ? t('shop.plan.recommended_suffix') : '';
                const btnLabel = (p.price == null) ? t('shop.plan.button.request_quote') : t('shop.plan.button.subscribe');
                const features = (() => {
                    if (/standard/i.test(name)) return ['500 GB de volume', 'Support standard', 'Priorité normale'];
                    if (/pro/i.test(name)) return ['1 000 GB de volume', 'Support rapide', 'Priorité haute'];
                    if (/premium/i.test(name)) return ['2 500 GB de volume', 'Support VIP', 'Priorité Ultra'];
                    return p.description ? [p.description] : [];
                })();
                const link = p.paymentLink || '';
                return `
                    <div class="plan-card">
                        <div class="plan-name">${name}${recommended}</div>
                        <div class="plan-price">${priceLabel}</div>
                        ${gbLabel ? `<div class="plan-points">${gbLabel}</div>` : ''}
                        <ul class="plan-features">
                            ${features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        <button class="profile-btn primary" data-link="${link}" style="font-size: 0.85em; padding: 8px 12px;">${btnLabel}</button>
                    </div>
                `;
            }).join('');
            return `
                <div id="subscription-modal" class="modal-overlay">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>${t('enterprise.subscriptions.title')}</h3>
                            <button id="subscription-close" class="profile-btn">${t('common.close')}</button>
                        </div>
                        <div class="modal-content">
                            <div class="plans-grid">
                                ${freeTierCard}
                                ${planCards}
                            </div>
                            <div class="topup-section">
                                <h4>Rechargement de volume</h4>
                                <div class="topup-grid">
                                    <div class="topup-item">10€ = 250 GB</div>
                                    <div class="topup-item">40€ = 1 000 GB</div>
                                    <div class="topup-item">100€ = 2 500 GB</div>
                                </div>
                                <h4>Coûts estimés par job</h4>
                                <ul class="points-examples">
                                    <li>Analyse Web : ~5 MB</li>
                                    <li>Conversion Audio : ~50 MB / min</li>
                                    <li>Encodage Vidéo : ~500 MB / min</li>
                                    <li>Traitement de données : ~100 MB</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getTasksHTML() {
            return `

                        <h1 class="page-title">${t('tasks.title')}</h1>

        function initializeTasksPage() {
            const token = localStorage.getItem('token');
            (async () => {
                let data = null;
                try {
                    const r = await fetch(`${API_BASE}/api/tasks`);
                    if (r.ok) {
                        data = await r.json();
                    } else {
                        throw new Error('public_tasks_unavailable');
                    }
                } catch {
                    try {
                        const r2 = await fetch(`${API_BASE}/api/admin/tasks`, { headers: token ? { 'Authorization': `Bearer ${token}` } : {} });
                        if (r2.ok) {
                            const j2 = await r2.json();
                            const tasks = (j2.tasks || []).filter(x => x && (x.active === true || x.active === 1 || x.active === '1'));
                            data = { tasks };
                        } else {
                            data = { tasks: [] };
                        }
                    } catch {
                        data = { tasks: [] };
                    }
                }
                const list = document.getElementById('tasks-list');
                const token = localStorage.getItem('token');
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const typeLabels = {
                    x_follow: t('tasks.type.x_follow'),
                    x_like: t('tasks.type.x_like'),
                    telegram_join: t('tasks.type.telegram_join'),
                    twofa_enable: 'Validé 2FA',
                    early_adopter: 'Early Adopter (Auto)'
                };
                
                // Fetch early adopter status for current user
                let eaStatus = { isEarlyAdopter: false, isGold: false, spotsLeft: 50, newlyGold: false };
                if (token) {
                    try {
                        const eaRes = await fetch(`${API_BASE}/api/early-adopter/status`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const eaData = await eaRes.json();
                        
                        // Check if user just became Gold (compare with previous session)
                        const previousGold = sessionStorage.getItem('wasGold') === 'true';
                        const currentlyGold = eaData.isGold || false;
                        const newlyGold = currentlyGold && !previousGold;
                        
                        if (newlyGold) {
                            sessionStorage.setItem('wasGold', 'true');
                        }
                        
                        // Fallback: vérifier le rang local si l'API ne retourne pas isGold
                        const localUser = JSON.parse(localStorage.getItem('user') || '{}');
                        const localRank = (localUser.rank || '').toLowerCase();
                        const isEligibleRank = ['gold', 'platinum', 'diamond'].includes(localRank) || currentlyGold;

                        eaStatus = {
                            isEarlyAdopter: eaData.isEarlyAdopter || isEligibleRank,
                            isGold: isEligibleRank,
                            spotsLeft: eaData.spotsLeft || 50,
                            newlyGold: newlyGold || (isEligibleRank && !previousGold)
                        };
                    } catch (e) {
                        console.error('Early adopter status fetch error:', e);
                    }
                }

                const items = (data.tasks || []).map(task => {
                    const typeLabel = typeLabels[task.type] || (task.type || '');
                    const bonus = task.reward_airdrop_bonus_percent || 0;
                    const points = task.reward_points || 0;
                    
                    let statusLabel = t('tasks.validate');
                    let btnStyle = '';
                    let isDisabled = false;
                    let extraInfo = '';

                    if (task.type === 'early_adopter') {
                        // Source d'autorité: le rang Gold ou le statut eaStatus
                        const eligibleRanks = ['Gold', 'Platinum', 'Diamond'];
                        const isGold = eaStatus.isGold || (user && eligibleRanks.includes(user.rank));
                        
                        if (isGold) {
                            statusLabel = t('tasks.validated');
                            btnStyle = 'background-color: #fbbf24; border-color: #fbbf24; color: #000; font-weight: bold;';
                            isDisabled = true;
                            // Auto-valider via API sans attendre admin
                            if (token) {
                                fetch(`${API_BASE}/api/tasks/approve`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ taskId: task.id })

                            }
                        } else if (eaStatus.isEarlyAdopter && Number(eaStatus.spotsLeft || 0) <= 0) {
                            statusLabel = 'Non éligible (Limite atteinte)';
                            btnStyle = 'background-color: #374151; border-color: #374151; opacity: 0.7;';
                            isDisabled = true;
                            extraInfo = '<div style="margin-top:8px; color:#94a3b8; font-size:0.85em;">Désolé, les 50 places Gold ont déjà été attribuées.</div>';
                        } else {
                            statusLabel = 'En attente du premier Ping...';
                            btnStyle = 'background-color: #1e3a8a; border-color: #1e3a8a;';
                            isDisabled = true;
                            extraInfo = '<div style="margin-top:8px; color:#93c5fd; font-size:0.85em;">Places restantes : ' + eaStatus.spotsLeft + '/50. Installez l\'app et lancez un ping pour valider !</div>';

                                                        styleEl.id = 'ea-congrats-style';
                                                        styleEl.textContent = '@keyframes pulse-gold { 0% { box-shadow:0 0 0 0 rgba(251,191,36,0.4); } 70% { box-shadow:0 0 0 10px rgba(251,191,36,0); } 100% { box-shadow:0 0 0 0 rgba(251,191,36,0); } }';
                                                        document.head.appendChild(styleEl);
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            });
                            Object.keys(localStorage).forEach(k=>{
                                if (/^task_approved_\d+$/.test(k)) localStorage.removeItem(k);
                            });
                        } catch {}
                    });
                }

                list.querySelectorAll('button.profile-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const url = btn.getAttribute('data-url');
                        const id = btn.getAttribute('data-id');
                        const type = btn.getAttribute('data-type') || '';
                        if (type === 'twofa_enable') {
                            if (!token) { alert('Connectez-vous pour valider.'); return; }
                            const timerEl = document.getElementById(`task-timer-${id}`);
                            timerEl.textContent = 'Vérification 2FA…';
                            fetch(`${API_BASE}/api/auth/2fa/status`, { headers: { 'Authorization': `Bearer ${token}` }})
                              .then(r=>r.json()).then(j=>{
                                if (!j || !j.enabled) {
                                    timerEl.textContent = '2FA non activé';
                                    alert('Activez la 2FA dans votre Profil pour valider cette task.');
                                    return;
                                }
                                fetch(`${API_BASE}/api/tasks/approve`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ taskId: id })
                                }).then(async (r) => {
                                    let ok = r.ok; let jj = null; try { jj = await r.json(); } catch {}
                                    if (!ok || (jj && jj.error)) { timerEl.textContent = t('tasks.error'); return; }
                                    timerEl.textContent = t('tasks.validated');
                                    btn.textContent = t('tasks.validated');
                                    btn.style.backgroundColor = '#14532d';
                                    btn.style.borderColor = '#14532d';
                                    btn.style.cursor = 'default';
                                    btn.disabled = true;
                                    try { refreshHeader(); } catch {}
                                }).catch(()=>{ timerEl.textContent = t('tasks.error'); });
                              }).catch(()=>{ timerEl.textContent = t('tasks.error'); });
                            return;
                        }
                        try { if (url) window.open(url, '_blank'); } catch {}
                        const timerEl = document.getElementById(`task-timer-${id}`);
                        let s = 30;
                        timerEl.textContent = `${s}s`;
                        const iv = setInterval(() => {
                            s--; timerEl.textContent = `${s}s`;
                            if (s <= 0) {
                                clearInterval(iv);
                                fetch(`${API_BASE}/api/tasks/approve`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ taskId: id })
                                }).then(async (r) => {
                                    let ok = r.ok;
                                    let j = null;
                                    try { j = await r.json(); } catch {}
                                    
                                    if (!ok || (j && j.error)) {
                                        timerEl.textContent = t('tasks.error');
                                        return;
                                    }
                                    
                                    // FIX: accepter pending ET approved comme "soumis avec succès"
                                    const submitted = j && (
                                        j.status === 'approved' || 
                                        j.status === 'pending' || 
                                        j.success === true ||
                                        j.message  // toute réponse positive
                                    );
                                    
                                    if (!submitted) { 
                                        timerEl.textContent = t('tasks.error'); 
                                        return; 
                                    }
                                    
                                    // Afficher selon le statut réel
                                    const isApproved = j.status === 'approved';
                                    timerEl.textContent = isApproved ? t('tasks.validated') : 'En attente de validation';
                                    btn.textContent = isApproved ? t('tasks.validated') : 'Soumise';
                                    btn.style.backgroundColor = isApproved ? '#14532d' : '#1e3a8a';
                                    btn.style.borderColor = isApproved ? '#14532d' : '#1e3a8a';
                                    btn.style.cursor = 'default';
                                    btn.disabled = true;
                                    
                                    try { refreshHeader(); } catch {}
                                    try { 
                                        const uid = (window.currentUserId != null) ? String(window.currentUserId) : (currentUsername || 'anon');
                                        localStorage.setItem(`task_approved_${uid}_${id}`, j.status || 'pending'); 
                                    } catch {}
                                }).catch(() => {
                                    timerEl.textContent = t('tasks.error');
                                });
                            }
                        }, 1000);
                    });
                });
            })();
        }

                                    })

                                fetch(`${API_BASE}/api/admin/users/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } })
                                    .then(async r => {
                                        let data = {};
                                        try { data = await r.json(); } catch {}

                                    })
                                    .catch(err => {
                                        alert('Erreur lors de la suppression du compte: ' + (err.message || err));

                             if (confirm("Supprimer l'abonnement de cet utilisateur (les avantages resteront jusqu'à la fin de la période) ?")) {
                                fetch(`${API_BASE}/api/admin/users/${id}/cancel-subscription`, { 
                                    method: 'POST',
                                    headers: { 'Authorization': `Bearer ${token}` }
                                })

                                    alert('Abonnement annulé avec succès.');
                                })
                                .catch(() => alert('Erreur lors de l\'annulation'));
                             }
                        } else if (action === 'bonus') {
                            openBonusModal(id);
                        } else if (action === 'edit-points') {
                            const curCell = b.closest('tr')?.querySelector('td:nth-child(6)');
                            const current = curCell ? parseFloat(curCell.textContent.replace(/[^0-9.-]/g,'')) : null;

        window.saveBonus = function() {

            const amount = document.getElementById('bonus-amount').value;
            const token = localStorage.getItem('token');

            if (btn) btn.disabled = true;
            fetch(`${API_BASE}/api/admin/users/${userId}/bonus`, { 
                method: 'POST', 
                headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` }, 
                body: JSON.stringify({ type, amount }) 
            })
            .then(async r => {
                if (!r.ok) {
                    const j = await r.json().catch(()=>{});
                    throw new Error(j.error || 'Erreur');
                }
                alert('Bonus appliqué avec succès');
                closeBonusModal();

                                let val = '0.00';

                                    val = Number(j.usage.remainingGB).toFixed(2);
                                } else if (j && j.credits_balance !== undefined) {
                                    val = (Number(j.credits_balance) / 1024).toFixed(2);
                                }
                                ac.textContent = `API: ${val} GB`; 
                            })
                            .catch(()=>{});
                    }
                    try { if (typeof refreshHeader === 'function') refreshHeader(); } catch {}
                    const body = document.getElementById('user-detail-body');
                    if (body && body.closest('#user-detail-modal')?.classList.contains('open')) {

            .finally(()=>{ if (btn) btn.disabled = false; })
            .catch(e => alert('Erreur: ' + e.message));
        }
